<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; padding: 20px; 
            background-color: transparent; 
            font-family: 'Luckiest Guy', cursive; 
            display: flex; flex-direction: column; align-items: center; gap: 40px;
        }

        .heavy-text {
            font-weight: normal; 
            text-transform: uppercase; text-align: center;
            -webkit-text-stroke: 2px #000;
            text-shadow: 4px 4px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000;
        }

        .block { display: flex; flex-direction: column; align-items: center; animation: pop 0.4s ease-out; }

        .title-diario { font-size: 42px; color: #ffffff; letter-spacing: 3px; margin-bottom: 5px; }
        .title-historico { font-size: 42px; color: #ffd700; letter-spacing: 3px; margin-bottom: 5px; }

        .avatar-container { position: relative; margin: 15px 0 25px 0; }
        .avatar { 
            width: 150px; height: 150px; border-radius: 50%; object-fit: cover;
            border: 5px solid #00f2fe; box-shadow: 0 0 25px #00f2fe, inset 0 0 20px #00f2fe;
        }
        
        /* 🌟 FONDO TRANSPARENTE PARA LAS MONEDAS */
        .coins-badge {
            position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 32px; 
            -webkit-text-stroke: 1.5px #000; white-space: nowrap;
            text-shadow: 3px 3px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000;
            display: flex; align-items: center; gap: 8px; font-family: 'Luckiest Guy', cursive;
            background: transparent; /* Fondo eliminado */
            border: none; /* Borde eliminado */
            box-shadow: none; /* Sombra eliminada */
        }

        .fa-single-coin {
            background: #ffd700; color: #b38000; border-radius: 50%; 
            width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center;
            border: 2px solid #b38000; font-size: 18px; 
            -webkit-text-stroke: 0; text-shadow: none; 
            box-shadow: inset 0 0 4px rgba(255,255,255,0.8); 
        }

        .name { font-size: 36px; color: #00f2fe; margin-top: 5px; letter-spacing: 2px; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .wins-diario { font-size: 65px; color: #ffffff; margin-top: -15px;}
        .wins-historico { font-size: 65px; color: #ffd700; margin-top: -15px;}

        @keyframes pop { 0% { transform: scale(0.8); opacity:0;} 100% { transform: scale(1); opacity:1;} }
    </style>
</head>
<body>

    <div class="block" id="bloque-diario" style="display:none;">
        <div class="heavy-text title-diario">🔥 RECORD DIARIO 🔥</div>
        <div class="avatar-container" id="container-foto-diario">
            <img src="" class="avatar" id="avatar-diario" onerror="this.src='https://via.placeholder.com/150/222/fff?text=?'">
            <div class="heavy-text coins-badge" id="coins-diario"></div>
        </div>
        <div class="heavy-text name" id="name-diario">ESPERANDO</div>
        <div class="heavy-text wins-diario" id="wins-diario">WINS X0</div>
    </div>

    <div class="block" id="bloque-historico" style="display:none;">
        <div class="heavy-text title-historico">🏆 RECORD HISTORICO 🏆</div>
        <div class="avatar-container" id="container-foto-historico">
            <img src="" class="avatar" id="avatar-historico" onerror="this.src='https://via.placeholder.com/150/222/fff?text=?'">
            <div class="heavy-text coins-badge" id="coins-historico"></div> 
        </div>
        <div class="heavy-text name" id="name-historico">ESPERANDO</div>
        <div class="heavy-text wins-historico" id="wins-historico">WINS X0</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on('racha_data_update', (data) => {
            if (!data) return;

            let arrDiario = Object.values(data.recordDiario || {}).sort((a,b)=>b.wins-a.wins);
            let topDiario = arrDiario[0];

            if (topDiario) {
                document.getElementById('bloque-diario').style.display = 'flex';
                document.getElementById('avatar-diario').src = topDiario.avatar;
                document.getElementById('name-diario').innerText = topDiario.displayName;
                document.getElementById('wins-diario').innerText = `WINS X${topDiario.wins}`;
                
                document.getElementById('coins-diario').innerHTML = `<i class="fa-solid fa-dollar-sign fa-single-coin"></i> ${topDiario.monedas || 0}`;

                document.getElementById('avatar-diario').style.display = data.showPhoto ? 'block' : 'none';
                document.getElementById('coins-diario').style.display = data.showCoins ? 'flex' : 'none';
            } else {
                document.getElementById('bloque-diario').style.display = 'none';
            }

            let arrHistorico = Object.values(data.recordHistorico || {}).sort((a,b)=>b.wins-a.wins);
            let topHistorico = arrHistorico[0];

            if (topHistorico) {
                document.getElementById('bloque-historico').style.display = 'flex';
                document.getElementById('avatar-historico').src = topHistorico.avatar;
                document.getElementById('name-historico').innerText = topHistorico.displayName;
                document.getElementById('wins-historico').innerText = `WINS X${topHistorico.wins}`;
                
                document.getElementById('coins-historico').innerHTML = `<i class="fa-solid fa-dollar-sign fa-single-coin"></i> ${topHistorico.monedas || 0}`;
                
                document.getElementById('avatar-historico').style.display = data.showPhoto ? 'block' : 'none';
                document.getElementById('coins-historico').style.display = data.showCoins ? 'flex' : 'none';
            } else {
                document.getElementById('bloque-historico').style.display = 'none';
            }
        });
    </script>
</body>
</html>
