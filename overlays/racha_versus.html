<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; padding: 0; 
            background-color: transparent; 
            font-family: 'Luckiest Guy', cursive; 
            width: 100vw; height: 100vh;
            position: relative; 
        }

        #bloque-salvar {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: none; 
            flex-direction: column; 
            align-items: center; 
            animation: floatAngel 4s ease-in-out infinite;
            width: 400px;
        }

        #bloque-reiniciar {
            position: absolute;
            top: 450px; 
            left: 50%;
            transform: translateX(-50%);
            display: none; 
            flex-direction: column; 
            align-items: center; 
            animation: floatDevil 4s ease-in-out infinite 2s; 
            width: 400px;
        }

        .avatar-container { position: relative; margin-bottom: 5px; }
        
        .avatar { 
            width: 160px; height: 160px; border-radius: 50%; object-fit: cover;
            border: 6px solid #00f2fe; position: relative; z-index: 10;
        }
        .avatar-salvar { border-color: #00ff66; box-shadow: 0 0 25px #00ff66, inset 0 0 20px #00ff66; }
        .avatar-reiniciar { border-color: #ff003c; box-shadow: 0 0 25px #ff003c, inset 0 0 20px #ff003c; }

        .halo {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%) rotateX(60deg);
            width: 110px; height: 40px; border: 6px solid #ffd700; border-radius: 50%;
            box-shadow: 0 0 15px #ffd700, inset 0 0 15px #ffd700; z-index: 11;
        }

        .svg-horns {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            width: 160px; height: 80px; 
            z-index: 5; /* 🌟 CORREGIDO: Ahora están detrás de la foto (z-index 10) */
            filter: drop-shadow(0 0 10px #ff003c);
        }
        
        .tail {
            position: absolute; bottom: 20px; right: -60px; 
            z-index: 5; /* 🌟 CORREGIDO: Cola también detrás */
            font-size: 80px; color: #ff003c; text-shadow: 0 0 15px #ff003c;
            transform: rotate(-10deg);
        }

        .heavy-text {
            font-weight: normal; text-transform: uppercase; text-align: center;
            -webkit-text-stroke: 2.5px #000;
            text-shadow: 4px 4px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000;
            z-index: 20; position: relative; paint-order: stroke fill; 
        }

        .name { font-size: 40px; color: #00ff66; margin-top: 10px; letter-spacing: 2px; max-width: 320px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .name-reiniciar { color: #ff003c; }

        .wins-text { font-size: 65px; margin-top: -15px; letter-spacing: 2px;}
        .wins-salvar { color: #00ff66; }
        .wins-reiniciar { color: #ff003c; }

        .coins-badge {
            position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 32px; z-index: 20;
            -webkit-text-stroke: 1.5px #000; white-space: nowrap;
            text-shadow: 3px 3px 0px #000;
            display: flex; align-items: center; gap: 8px; font-family: 'Luckiest Guy', cursive;
        }
        .fa-single-coin {
            background: #ffd700; color: #b38000; border-radius: 50%; 
            width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center;
            border: 2px solid #b38000; font-size: 18px; 
            -webkit-text-stroke: 0; text-shadow: none; box-shadow: inset 0 0 4px rgba(255,255,255,0.8); 
        }

        @keyframes floatAngel {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }
        @keyframes floatDevil {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }
    </style>
</head>
<body>

    <div id="bloque-salvar">
        <div class="avatar-container">
            <div class="halo"></div>
            <img src="" class="avatar avatar-salvar" id="avatar-salvar" onerror="this.src='https://via.placeholder.com/150/222/fff?text=?'">
            <div class="heavy-text coins-badge" id="coins-salvar"></div>
        </div>
        <div class="heavy-text name" id="name-salvar">ESPERANDO</div>
        <div class="heavy-text wins-text wins-salvar" id="wins-salvar">0 SALVADAS</div>
    </div>

    <div id="bloque-reiniciar">
        <div class="avatar-container">
            <svg class="svg-horns" viewBox="0 0 160 80" xmlns="http://www.w3.org/2000/svg">
                <path d="M 60,70 C 40,50 15,35 10,10 C 25,25 45,20 55,40 C 58,48 60,60 60,70 Z" fill="#ff003c" stroke="#000" stroke-width="2.5"/>
                <path d="M 100,70 C 120,50 145,35 150,10 C 135,25 115,20 105,40 C 102,48 100,60 100,70 Z" fill="#ff003c" stroke="#000" stroke-width="2.5"/>
            </svg>
            <div class="tail"><i class="fa-solid fa-arrow-trend-down"></i></div>
            
            <img src="" class="avatar avatar-reiniciar" id="avatar-reiniciar" onerror="this.src='https://via.placeholder.com/150/222/fff?text=?'">
            <div class="heavy-text coins-badge" id="coins-reiniciar"></div>
        </div>
        <div class="heavy-text name name-reiniciar" id="name-reiniciar">ESPERANDO</div>
        <div class="heavy-text wins-text wins-reiniciar" id="wins-reiniciar">0 REINICIOS</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let configOpciones = { showName: true, showCount: true, showCoins: true };
        let histData = { salvadas: {}, reinicios: {} };
        let currentSalvar = null;
        let currentReiniciar = null;

        socket.on('racha_versus_update', (data) => {
            if(!data) return;
            configOpciones.showName = data.showName !== false;
            configOpciones.showCount = data.showCount !== false;
            configOpciones.showCoins = data.showCoins !== false;
            
            histData.salvadas = data.salvadas || {};
            histData.reinicios = data.reinicios || {};
            renderOverlay();
        });

        socket.on('actualizacion_salvar', (data) => {
            currentSalvar = data.topSalvar;
            currentReiniciar = data.topReiniciar;
            renderOverlay();
        });

        function renderOverlay() {
            // EQUIPO 1: SALVAR
            if (currentSalvar && currentSalvar.name && currentSalvar.name !== 'ESPERANDO') {
                document.getElementById('bloque-salvar').style.display = 'flex';
                document.getElementById('avatar-salvar').src = currentSalvar.avatar;
                
                let sName = currentSalvar.name.replace(/[^a-zA-Z0-9\sÁÉÍÓÚáéíóúÑñ]/g, '').trim();
                let histCount = histData.salvadas[currentSalvar.name] ? histData.salvadas[currentSalvar.name].count : 0;
                
                // 🌟 CORRECCIÓN GRAMATICAL: Singular vs Plural
                let textoSalvada = histCount === 1 ? "SALVADA" : "SALVADAS";
                
                document.getElementById('name-salvar').innerText = sName;
                document.getElementById('wins-salvar').innerText = `${histCount} ${textoSalvada}`;
                document.getElementById('coins-salvar').innerHTML = `<i class="fa-solid fa-dollar-sign fa-single-coin"></i> ${currentSalvar.coins}`;

                document.getElementById('name-salvar').style.display = configOpciones.showName ? 'block' : 'none';
                
                if (histCount > 0 && configOpciones.showCount) {
                    document.getElementById('wins-salvar').style.display = 'block';
                } else {
                    document.getElementById('wins-salvar').style.display = 'none';
                }

                document.getElementById('coins-salvar').style.display = configOpciones.showCoins ? 'flex' : 'none';
            } else {
                document.getElementById('bloque-salvar').style.display = 'none';
            }

            // EQUIPO 2: REINICIAR
            if (currentReiniciar && currentReiniciar.name && currentReiniciar.name !== 'ESPERANDO') {
                document.getElementById('bloque-reiniciar').style.display = 'flex';
                document.getElementById('avatar-reiniciar').src = currentReiniciar.avatar;
                
                let rName = currentReiniciar.name.replace(/[^a-zA-Z0-9\sÁÉÍÓÚáéíóúÑñ]/g, '').trim();
                let histCount = histData.reinicios[currentReiniciar.name] ? histData.reinicios[currentReiniciar.name].count : 0;
                
                // 🌟 CORRECCIÓN GRAMATICAL: Singular vs Plural
                let textoReinicio = histCount === 1 ? "REINICIO" : "REINICIOS";
                
                document.getElementById('name-reiniciar').innerText = rName;
                document.getElementById('wins-reiniciar').innerText = `${histCount} ${textoReinicio}`;
                document.getElementById('coins-reiniciar').innerHTML = `<i class="fa-solid fa-dollar-sign fa-single-coin"></i> ${currentReiniciar.coins}`;

                document.getElementById('name-reiniciar').style.display = configOpciones.showName ? 'block' : 'none';
                
                if (histCount > 0 && configOpciones.showCount) {
                    document.getElementById('wins-reiniciar').style.display = 'block';
                } else {
                    document.getElementById('wins-reiniciar').style.display = 'none';
                }
                
                document.getElementById('coins-reiniciar').style.display = configOpciones.showCoins ? 'flex' : 'none';
            } else {
                document.getElementById('bloque-reiniciar').style.display = 'none';
            }
        }
    </script>
</body>
</html>
