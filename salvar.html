<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Bebas+Neue&family=Lilita+One&family=Luckiest+Guy&family=Montserrat:ital,wght@0,700;0,900;1,900&family=Oswald:wght@700&family=Russo+One&family=Teko:wght@600&family=Lemon&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background-color: transparent; 
            color: white; overflow: hidden;
        }
        
        .widget-wrapper { 
            width: 100vw; height: 100vh; position: relative; 
        }

        .text-con-stroke, .status-zone, .countdown-line1, .countdown-line2, .countdown-number, .text-eq1, .text-eq2, .score, #winner-title, #winner-name {
            paint-order: stroke fill; 
        }

        .status-zone {
            position: absolute; top: 8%; left: 0; width: 100%; text-align: center;
            font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            z-index: 10; display: none; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-text-stroke: 1.5px black;
        }

        .core-block {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .headers {
            width: 90%; max-width: 800px; display: flex; justify-content: space-between;
            font-size: 28px; font-weight: 900; font-style: italic; letter-spacing: 2px;
            margin-bottom: 5px;
        }
        
        .text-eq1 { -webkit-text-stroke: 1.5px black; transition: color 0.3s; }
        .text-eq2 { -webkit-text-stroke: 1.5px black; transition: color 0.3s; }

        .bar-bg {
            width: 90%; max-width: 800px; height: 60px; display: flex; position: relative; background: #111;
            border: 2px solid #333; border-radius: 4px; overflow: hidden; box-shadow: 0px 10px 30px rgba(0,0,0,0.8);
        }
        
        .bar-side {
            height: 100%; display: flex; align-items: center; box-sizing: border-box;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s; overflow: hidden; white-space: nowrap;
        }
        
        .bar-left { width: 50%; justify-content: flex-start; padding: 0 25px; border-right: 3px solid #ffffff; z-index: 2; }
        .bar-right { width: 50%; justify-content: flex-end; padding: 0 25px; }

        .battle-emoji {
            position: absolute; top: 50%; transform: translate(-50%, -50%);
            font-size: 45px; z-index: 5; transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.8));
        }

        .score { font-size: 38px; font-weight: 900; color: #ffffff; }

        .heroes-row { width: 90%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; margin-top: 5px; font-family: 'Montserrat', sans-serif;}
        .hero-group { display: flex; align-items: center; gap: 12px; background: rgba(20, 20, 20, 0.8); padding: 5px 15px; border-radius: 50px; border: 1px solid #333; transition: border-color 0.3s; }
        
        .name { font-size: 18px; font-weight: 700; text-transform: uppercase; color: #ddd; letter-spacing: 1px;}
        .donator-coins { font-size: 16px; font-weight: 900; color: #ffd700; text-shadow: 1px 1px 0px black; display: none;}
        .donator-coins i { margin-right: 4px; color: #ffcc00; } 
        .avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; object-fit: cover; display: none; }

        .countdown-zone {
            position: absolute;
            top: 58%; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            display: none; 
            flex-direction: column; align-items: center; justify-content: center; animation: emerge 0.5s ease-out;
        }
        
        .countdown-line1 { font-weight: 900; letter-spacing: 2px; margin-bottom: -5px; z-index: 2; transition: color 0.3s;}
        .countdown-line2 { font-weight: 900; letter-spacing: 3px; margin-bottom: -20px; z-index: 2; animation: flashRed 1s infinite;}
        .countdown-number { font-weight: 900; animation: heartbeat 1s infinite; line-height: 1;}

        #winner-zone {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%; 
        }
        #winner-avatar {
            width: 90px; height: 90px;
            border-radius: 50%; border: 5px solid #ff003c; object-fit: cover; margin-bottom: 5px; box-shadow: 0 0 20px #ff003c;
        }
        
        #winner-title {
            font-size: 55px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; text-align: center;
            -webkit-text-stroke: 2.5px black; line-height: 1.1; margin-bottom: 2px;
        }
        
        #winner-name {
            font-size: 26px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; text-align: center;
            color: #ffffff; 
            -webkit-text-stroke: 1.5px black;
            max-width: 350px; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }

        @keyframes flashRed { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.5); } }
        @keyframes popIn { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes emerge { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes heartbeat { 0%, 30%, 100% { transform: scale(1); } 15% { transform: scale(1.15); } }

        #canvas-effects { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>
    <canvas id="canvas-effects"></canvas>
    
    <div class="widget-wrapper">

        <div class="status-zone" id="status-zone"></div>

        <div class="core-block">
            <div class="headers">
                <div class="text-eq1" id="title-eq1">SALVAR (GG)</div>
                <div class="text-eq2" id="title-eq2">REINICIAR (ROSA)</div>
            </div>

            <div class="bar-bg">
                <div class="bar-side bar-left" id="bar1">
                    <span class="score" id="score1">0</span>
                </div>
                <div class="bar-side bar-right" id="bar2">
                    <span class="score" id="score2">0</span>
                </div>
                <div class="battle-emoji" id="battle-emoji" style="display:none;">⚔️</div>
            </div>

            <div class="heroes-row" id="heroes-row">
                <div class="hero-group hero-left" id="group-left">
                    <img class="avatar" id="avatar1" src="" alt="">
                    <span class="name" id="name1">Nadie aún</span>
                    <span class="donator-coins" id="donatorCoins1">0</span>
                </div>
                <div class="hero-group hero-right" id="group-right">
                    <img class="avatar" id="avatar2" src="" alt="">
                    <span class="name" id="name2">Nadie aún</span>
                    <span class="donator-coins" id="donatorCoins2">0</span>
                </div>
            </div>
        </div>

        <div class="countdown-zone" id="countdown-display">
            <div class="countdown-line1" id="countdown-line1-text">XX PARA SALVARNOS</div>
            <div class="countdown-line2" id="countdown-line2-text">REINICIANDO EN</div>
            <div class="countdown-number" id="timer">30</div>
            
            <div id="winner-zone">
                <img id="winner-avatar" src="https://via.placeholder.com/150/222/fff?text=?">
                <div id="winner-title">¡TE REINICIÓ!</div>
                <div id="winner-name">EL EQUIPO 2</div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        let currentConfig = null;
        let timer = 30;
        let countdownInterval = null;
        let audioCtx = null;
        
        let isGameOver = false; 
        let wasLosing = false;
        let latestData = null; 
        let winRegistered = false; // 🌟 CANDADO DE SEGURIDAD PARA CONTAR PUNTOS 1 SOLA VEZ

        function playAlertSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = "sine";
                osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.2); 
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.2);
            } catch(e) {} 
        }

        function playCoinSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = "sine";
                osc.frequency.setValueAtTime(987.77, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(1318.51, audioCtx.currentTime + 0.1); 
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.4);
            } catch(e) {}
        }

        function applyDesign(style, eqColors) {
            if (!style || !eqColors) return;
            
            document.body.style.fontFamily = style.fontFamily;
            
            const strokedElements = document.querySelectorAll('.text-eq1, .text-eq2, .status-zone, .countdown-line1, .countdown-line2, .score');
            strokedElements.forEach(el => el.style.webkitTextStroke = style.textStroke + "px black");
            document.getElementById('timer').style.webkitTextStroke = (style.textStroke * 2.5) + "px black";

            const l1 = document.getElementById('countdown-line1-text');
            l1.style.color = style.colorL1; l1.style.fontSize = style.sizeL1 + "px";

            const l2 = document.getElementById('countdown-line2-text');
            l2.style.color = style.colorL2; l2.style.fontSize = style.sizeL2 + "px";

            const lt = document.getElementById('timer');
            lt.style.color = style.colorTimer; lt.style.fontSize = style.sizeTimer + "px";

            const c1 = eqColors.c1 || '#00ff66';
            const c2 = eqColors.c2 || '#ff003c';

            document.getElementById('title-eq1').style.color = c1;
            document.getElementById('title-eq2').style.color = c2;

            document.getElementById('bar1').style.background = c1;
            document.getElementById('bar2').style.background = c2;
            
            document.getElementById('group-left').style.borderLeft = `3px solid ${c1}`;
            document.getElementById('group-right').style.borderRight = `3px solid ${c2}`;

            const op = style.shadowOpacity !== undefined ? style.shadowOpacity : 1.0;
            const dist = style.shadowDistance !== undefined ? style.shadowDistance : 4;
            const shadowColor = `rgba(0,0,0,${op})`;
            
            const elementsWithShadow = [
                {el: document.querySelector('.text-eq1'), extra: `0 0 15px ${c1}`},
                {el: document.querySelector('.text-eq2'), extra: `0 0 15px ${c2}`},
                {el: document.querySelector('.score#score1'), extra: `-1px -1px 0px ${shadowColor}, 1px -1px 0px ${shadowColor}, -1px 1px 0px ${shadowColor}`},
                {el: document.querySelector('.score#score2'), extra: `-1px -1px 0px ${shadowColor}, 1px -1px 0px ${shadowColor}, -1px 1px 0px ${shadowColor}`},
                {el: l1}, {el: l2},
                {el: lt, extra: `0 0 40px #ff003c`}
            ];

            elementsWithShadow.forEach(item => {
                if(!item.el) return;
                let textShadowStr = `${dist}px ${dist}px 0px ${shadowColor}`;
                if(item.extra) textShadowStr += `, ${item.extra}`;
                item.el.style.textShadow = textShadowStr;
            });
        }

        socket.on('config_actual', (config) => {
            currentConfig = config;
            
            let sub1 = config.equipo1.sub.trim() ? ` (${config.equipo1.sub.trim()})` : "";
            let sub2 = config.equipo2.sub.trim() ? ` (${config.equipo2.sub.trim()})` : "";
            
            document.getElementById('title-eq1').innerText = `${config.equipo1.nombre}${sub1}`;
            document.getElementById('title-eq2').innerText = `${config.equipo2.nombre}${sub2}`;

            document.getElementById('heroes-row').style.display = config.showTopDonators !== false ? 'flex' : 'none';
            document.getElementById('donatorCoins1').style.display = config.showDonatorCoins ? 'inline' : 'none';
            document.getElementById('donatorCoins2').style.display = config.showDonatorCoins ? 'inline' : 'none';

            applyDesign(config.battleStyle, {c1: config.equipo1.color, c2: config.equipo2.color});
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'ArrowDown') socket.emit('reset');
        });

        function triggerGameOver(topReiniciar) {
            isGameOver = true;
            
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            
            // 🌟 REGISTRAR VICTORIA (REINICIO) AL SERVIDOR SÓLO UNA VEZ
            if (!winRegistered) {
                socket.emit('registrar_victoria_versus', { tipo: 'reinicio', user: topReiniciar });
                winRegistered = true;
            }
            
            document.getElementById('countdown-line1-text').style.display = 'none';
            document.getElementById('countdown-line2-text').style.display = 'none';
            document.getElementById('timer').style.display = 'none';
            
            let c2 = currentConfig.equipo2.color || "#ff003c";
            
            let rawName = topReiniciar && topReiniciar.name && topReiniciar.name !== 'ESPERANDO' ? topReiniciar.name : 'EL EQUIPO 2';
            let cleanName = rawName.replace(/[^a-zA-Z0-9\sÁÉÍÓÚáéíóúÑñ]/g, '').trim();
            if(!cleanName) cleanName = 'EL EQUIPO 2';

            let winnerImg = document.getElementById('winner-avatar');
            let winnerTitle = document.getElementById('winner-title');
            let winnerName = document.getElementById('winner-name');

            winnerImg.src = topReiniciar && topReiniciar.avatar ? topReiniciar.avatar : 'https://via.placeholder.com/150/222/fff?text=?';
            winnerImg.style.borderColor = c2;
            winnerImg.style.boxShadow = `0 0 20px ${c2}`;
            
            winnerTitle.innerText = `¡TE REINICIÓ!`;
            winnerTitle.style.color = c2;
            winnerName.innerText = cleanName;
            winnerName.style.color = "#ffffff";
            
            const op = currentConfig.battleStyle?.shadowOpacity !== undefined ? currentConfig.battleStyle.shadowOpacity : 1.0;
            const dist = currentConfig.battleStyle?.shadowDistance !== undefined ? currentConfig.battleStyle.shadowDistance : 4;
            
            let shadowStr = `${dist}px ${dist}px 0px rgba(0,0,0,${op}), 0 0 20px ${c2}`;
            winnerTitle.style.textShadow = shadowStr;
            winnerName.style.textShadow = `${dist}px ${dist}px 0px rgba(0,0,0,${op})`; 

            document.getElementById('winner-zone').style.display = 'flex';

            socket.emit('reset');

            setTimeout(() => {
                isGameOver = false;
                document.getElementById('winner-zone').style.display = 'none';
                
                if (latestData) {
                    wasLosing = latestData.totalReiniciar > latestData.totalSalvar; 
                    procesarActualizacionVisual(latestData);
                }
            }, 2000);
        }

        function triggerSaved(topSalvar) {
            isGameOver = true; 
            
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }

            // 🌟 REGISTRAR VICTORIA (SALVADA) AL SERVIDOR SÓLO UNA VEZ
            if (!winRegistered) {
                socket.emit('registrar_victoria_versus', { tipo: 'salvada', user: topSalvar });
                winRegistered = true;
            }
            
            document.getElementById('countdown-line1-text').style.display = 'none';
            document.getElementById('countdown-line2-text').style.display = 'none';
            document.getElementById('timer').style.display = 'none';
            
            let c1 = currentConfig.equipo1.color || "#00ff66";
            
            let rawName = topSalvar && topSalvar.name && topSalvar.name !== 'ESPERANDO' ? topSalvar.name : 'EL EQUIPO 1';
            let cleanName = rawName.replace(/[^a-zA-Z0-9\sÁÉÍÓÚáéíóúÑñ]/g, '').trim();
            if(!cleanName) cleanName = 'EL EQUIPO 1';

            let winnerImg = document.getElementById('winner-avatar');
            let winnerTitle = document.getElementById('winner-title');
            let winnerName = document.getElementById('winner-name');

            winnerImg.src = topSalvar && topSalvar.avatar ? topSalvar.avatar : 'https://via.placeholder.com/150/222/fff?text=?';
            winnerImg.style.borderColor = c1;
            winnerImg.style.boxShadow = `0 0 20px ${c1}`;
            
            winnerTitle.innerText = `¡TE SALVÓ!`;
            winnerTitle.style.color = c1;
            winnerName.innerText = cleanName;
            winnerName.style.color = "#ffffff";
            
            const op = currentConfig.battleStyle?.shadowOpacity !== undefined ? currentConfig.battleStyle.shadowOpacity : 1.0;
            const dist = currentConfig.battleStyle?.shadowDistance !== undefined ? currentConfig.battleStyle.shadowDistance : 4;
            
            let shadowStr = `${dist}px ${dist}px 0px rgba(0,0,0,${op}), 0 0 20px ${c1}`;
            winnerTitle.style.textShadow = shadowStr;
            winnerName.style.textShadow = `${dist}px ${dist}px 0px rgba(0,0,0,${op})`;

            document.getElementById('winner-zone').style.display = 'flex';

            setTimeout(() => {
                isGameOver = false;
                document.getElementById('winner-zone').style.display = 'none';
                
                if (latestData) {
                    wasLosing = latestData.totalReiniciar > latestData.totalSalvar; 
                    procesarActualizacionVisual(latestData);
                }
            }, 2000);
        }

        socket.on('actualizacion_salvar', (data) => {
            latestData = data;
            procesarActualizacionVisual(data);
        });

        function procesarActualizacionVisual(data) {
            if(!currentConfig) return;

            let total = data.totalSalvar + data.totalReiniciar;

            if (isGameOver) return; 

            if (total === 0) {
                wasLosing = false; 
                winRegistered = false; // 🌟 ABRIMOS EL CANDADO PARA LA SIGUIENTE RONDA
                document.getElementById('winner-zone').style.display = 'none';
                document.getElementById('countdown-display').style.display = 'none';
                if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
            }

            let isLosing = data.totalReiniciar > data.totalSalvar;
            
            if (wasLosing && !isLosing && data.totalSalvar > 0) {
                wasLosing = false; 
                triggerSaved(data.topSalvar);
                return; 
            }
            wasLosing = isLosing; 

            if(data.topSalvar.avatar) {
                document.getElementById('avatar1').src = data.topSalvar.avatar;
                document.getElementById('avatar1').style.display = 'block';
                document.getElementById('name1').innerText = data.topSalvar.name;
                document.getElementById('donatorCoins1').innerHTML = `<i class=\"fa-solid fa-coins\"></i> ${data.topSalvar.coins}`;
            } else {
                document.getElementById('avatar1').style.display = 'none';
                document.getElementById('name1').innerText = 'Nadie aún';
                document.getElementById('donatorCoins1').innerHTML = '';
            }
            document.getElementById('score1').innerText = data.totalSalvar;

            if(data.topReiniciar.avatar) {
                document.getElementById('avatar2').src = data.topReiniciar.avatar;
                document.getElementById('avatar2').style.display = 'block';
                document.getElementById('name2').innerText = data.topReiniciar.name;
                document.getElementById('donatorCoins2').innerHTML = `<i class=\"fa-solid fa-coins\"></i> ${data.topReiniciar.coins}`;
            } else {
                document.getElementById('avatar2').style.display = 'none';
                document.getElementById('name2').innerText = 'Nadie aún';
                document.getElementById('donatorCoins2').innerHTML = '';
            }
            document.getElementById('score2').innerText = data.totalReiniciar;

            let p1 = 50;
            if(total === 0) {
                document.getElementById('bar1').style.width = '50%';
                document.getElementById('bar2').style.width = '50%';
            } else {
                p1 = (data.totalSalvar / total) * 100;
                let p2 = (data.totalReiniciar / total) * 100;
                if(p1 < 20) { p1 = 20; p2 = 80; }
                if(p2 < 20) { p2 = 20; p1 = 80; }
                document.getElementById('bar1').style.width = p1 + '%';
                document.getElementById('bar2').style.width = p2 + '%';
            }

            if (currentConfig.showEmoticons) {
                let emoji = document.getElementById('battle-emoji');
                emoji.style.display = 'block';
                emoji.style.left = p1 + '%';
                if (total === 0 || p1 === 50) emoji.innerText = '⚔️';
                else if (p1 <= 30) emoji.innerText = '😭'; 
                else if (p1 > 30 && p1 < 50) emoji.innerText = '😰'; 
                else if (p1 > 50 && p1 < 70) emoji.innerText = '😼'; 
                else emoji.innerText = '😎'; 
            } else {
                document.getElementById('battle-emoji').style.display = 'none';
            }

            let statusZone = document.getElementById('status-zone');
            let nombreLlamativoEq1 = currentConfig.equipo1.sub.trim() ? currentConfig.equipo1.sub.trim() : currentConfig.equipo1.nombre;

            if (total === 0 || currentConfig.showTopText === false) {
                statusZone.style.display = 'none';
            } else if (data.totalReiniciar > data.totalSalvar) {
                let diff = data.totalReiniciar - data.totalSalvar;
                statusZone.innerHTML = `⚠️ NECESITAS ${diff} ${nombreLlamativoEq1} PARA SALVARTE ⚠️`;
                statusZone.style.color = '#ffcc00'; 
                statusZone.style.textShadow = `3px 3px 0px rgba(0,0,0,${currentConfig.battleStyle?.shadowOpacity || 1}), 0 0 15px #ffcc00`;
                statusZone.style.display = 'block';
            } else if (data.totalSalvar > data.totalReiniciar) {
                let diff = data.totalSalvar - data.totalReiniciar;
                let c1 = currentConfig.equipo1.color || "#00ff66";
                statusZone.innerHTML = `🛡️ PROTEGIDO POR ${diff} ${nombreLlamativoEq1} 🛡️`;
                statusZone.style.color = c1; 
                statusZone.style.textShadow = `3px 3px 0px rgba(0,0,0,${currentConfig.battleStyle?.shadowOpacity || 1}), 0 0 15px ${c1}`;
                statusZone.style.display = 'block';
            } else {
                statusZone.innerHTML = `⚔️ BATALLA IGUALADA ⚔️`;
                statusZone.style.color = '#ffffff'; 
                statusZone.style.textShadow = `3px 3px 0px rgba(0,0,0,${currentConfig.battleStyle?.shadowOpacity || 1}), 0 0 15px #ffffff`;
                statusZone.style.display = 'block';
            }

            let countdownDisplay = document.getElementById('countdown-display');
            let line1 = document.getElementById('countdown-line1-text');
            let line2 = document.getElementById('countdown-line2-text');
            let timerEl = document.getElementById('timer');
            
            if (currentConfig.enableCountdown && data.totalReiniciar > data.totalSalvar) {
                let diff = data.totalReiniciar - data.totalSalvar;
                line1.innerText = `${diff} PARA SALVARNOS`;
                line1.style.color = currentConfig.battleStyle.colorL1; 
                
                line1.style.display = 'block';
                line2.style.display = 'block';
                timerEl.style.display = 'block';
                
                countdownDisplay.style.display = 'flex'; 
                if (!countdownInterval) {
                    timer = currentConfig.countdownSeconds || 30; 
                    timerEl.innerText = timer;
                    
                    countdownInterval = setInterval(() => {
                        timer--;
                        playAlertSound(); 
                        
                        if (timer <= 0) { 
                            timer = 0; 
                            triggerGameOver(data.topReiniciar); 
                        }
                        if (!isGameOver) timerEl.innerText = timer;
                    }, 1000);
                }
            } else if (data.totalSalvar > data.totalReiniciar) {
                let diff = (data.totalSalvar - data.totalReiniciar) + 1;
                if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
                
                line1.innerText = `${diff} PARA REINICIAR`;
                line1.style.color = currentConfig.equipo2.color || '#ff003c'; 
                
                line1.style.display = 'block';
                line2.style.display = 'none'; 
                timerEl.style.display = 'none';
                
                countdownDisplay.style.display = 'flex';
            } else {
                countdownDisplay.style.display = 'none';
                if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
            }
        }

        const canvas = document.getElementById('canvas-effects');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];

        function createExplosion(x, y, color, amount) {
            let particleCount = Math.min(amount * 5 + 10, 80); 
            for(let i=0; i < particleCount; i++) { particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 25, vy: (Math.random() - 0.5) * 25, life: 1.0, color: color, size: Math.random() * 8 + 3 }); }
        }

        socket.on('poder_salvar', (data) => {
            playCoinSound(); 
            let x = canvas.width / 2; let color = 'white'; let y = canvas.height / 2; 
            if(data.side === 'salvar') {
                document.getElementById('bar1').style.filter = "brightness(1.5)"; setTimeout(() => document.getElementById('bar1').style.filter = "none", 150);
                x = (parseFloat(document.getElementById('bar1').style.width || 50) / 100) * canvas.width - 20; color = currentConfig.equipo1.color || '#00ff66'; 
            } else if (data.side === 'reiniciar') {
                document.getElementById('bar2').style.filter = "brightness(1.5)"; setTimeout(() => document.getElementById('bar2').style.filter = "none", 150);
                x = (parseFloat(document.getElementById('bar1').style.width || 50) / 100) * canvas.width + 20; color = currentConfig.equipo2.color || '#ff003c'; 
            }
            createExplosion(x, y, color, data.amount);
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.life -= 0.025; 
                if(p.life <= 0) particles.splice(i, 1);
                else { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); }
            }
            ctx.globalAlpha = 1.0; requestAnimationFrame(animate);
        }
        animate();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
