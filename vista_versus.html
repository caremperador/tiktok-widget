<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f0f13; color: white; font-family: 'Segoe UI', sans-serif; padding: 40px; margin: 0; }
        .box { background: #1a1a24; border: 1px solid #333; border-radius: 12px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); max-width: 900px; margin-bottom: 30px;}
        h3 { color: #fff; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 18px; }
        
        .top-row { display: flex; gap: 40px; align-items: flex-start; margin-bottom: 25px;}
        .col-layout { display: flex; gap: 30px; }
        .team-col { flex: 1; display: flex; flex-direction: column; gap: 15px; padding: 25px; border-radius: 8px; border: 1px solid #333; background: #222;}
        
        label { font-weight: bold; font-size: 12px; text-transform: uppercase;}
        input[type="text"], input[type="number"], select { width: 100%; background: #000; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 12px; font-size: 14px; box-sizing: border-box; }
        input[type="color"] { width: 100%; height: 40px; background: #000; border: 1px solid #444; border-radius: 6px; padding: 2px; cursor: pointer;}
        input:focus { border-color: #00f2fe; outline: none;}
        
        .checkbox-group { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; font-weight: bold; margin-bottom: 10px;}
        .checkbox-group input { width: 18px; height: 18px; accent-color: #00f2fe;}
        
        .btn-add { background: #444; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;}
        .btn-add:hover { background: #555; }
        
        .assigned-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .assigned-item { background: #111; border: 1px solid #555; padding: 6px 12px; border-radius: 6px; font-size: 13px; display: flex; gap: 10px; align-items: center;}
        .btn-remove { background: none; color: #ff003c; border: none; cursor: pointer; padding: 0; font-weight: bold;}
        
        .btn-guardar { width: 100%; padding: 18px; background: #00f2fe; color: black; font-size: 16px; font-weight: bold; border: none; cursor: pointer; border-radius: 8px; text-transform: uppercase;}
        .btn-guardar:hover { filter: brightness(1.1);}
        
        .overlay-bar { display: flex; gap: 10px; margin-top: 15px; }
        .btn-overlay { flex: 1; padding: 12px 5px; background: #222; color: #00ff66; font-size: 13px; font-weight: bold; border: 1px solid #00ff66; cursor: pointer; border-radius: 8px;}
        .btn-overlay:hover { background: #00ff66; color: black;}

        .design-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 15px;}
        .design-item { background: #111; padding: 15px; border-radius: 8px; border: 1px solid #444;}
        
        .color-selector { display: flex; gap: 8px; align-items: center; }
        .color-picker { width: 45px !important; padding: 0 !important; border: none !important; cursor: pointer; border-radius: 4px !important;}
        .color-hex { flex: 1; font-family: monospace; text-transform: uppercase; letter-spacing: 1px; }

        .manual-points-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; border: 1px solid #444; margin-bottom: 5px; }
        .mp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;}
        .mp-title { color:#aaa; font-weight:bold; font-size:12px; text-transform:uppercase;}
        .mp-score { font-size:24px; font-weight:900; text-shadow: 1px 1px 0 #000;}
        .mp-controls { display: flex; gap: 8px; }
        .mp-input { padding:10px !important; flex:1; background: #000 !important; }
        .btn-mp { border:none; border-radius:6px; font-weight:bold; cursor:pointer; padding: 0 15px; font-size: 16px;}
    </style>
</head>
<body>
    <div class="box">
        <h3><i class="fa-solid fa-gear"></i> Mecánicas de Batalla</h3>
        <div class="top-row">
            <div style="flex: 0.4;">
                <label style="color: #00f2fe;"><i class="fa-solid fa-stopwatch"></i> Segundos Cuenta Atrás</label>
                <input type="number" id="input-countdown-sec" style="margin-bottom: 15px;">
                
                <!-- 🌟 CAMBIO 1: Texto más corto y directo -->
                <button class="btn-clear" onclick="resetearValores()" style="width: 100%; background: #ff003c; color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; box-shadow: 0 4px 10px rgba(255,0,60,0.4);"><i class="fa-solid fa-skull"></i> Resetear a 0</button>
            </div>
            <div style="flex: 1; display: flex; flex-direction: column;">
                <label class="checkbox-group"><input type="checkbox" id="check-countdown"> Activar Cuenta Regresiva</label>
                <label class="checkbox-group"><input type="checkbox" id="check-round"> Redondear Regalos a Enteros <i class="fa-solid fa-arrow-up-1-9" style="color:#00ff66;"></i></label>
                <label class="checkbox-group"><input type="checkbox" id="check-top-donators"> Mostrar a los Top Donadores (MVP)</label>
                <label class="checkbox-group"><input type="checkbox" id="check-toptext"> Mostrar Texto Flotante Superior</label>
                <label class="checkbox-group"><input type="checkbox" id="check-coins"> Mostrar Monedas en Vivo <i class="fa-solid fa-coins" style="color:#ffd700;"></i></label>
                <label class="checkbox-group"><input type="checkbox" id="check-emoticons"> Mostrar Emoticono de Batalla 😜</label>
            </div>
        </div>

        <div class="col-layout">
            <div class="team-col">
                <div><label style="color:#00ff66;" id="lbl-eq1">Nombre Eq 1</label><input type="text" id="eq1-nombre"></div>
                <div><label style="color:#ccc;">Color de Equipo</label>
                    <div class="color-selector">
                        <input type="color" id="eq1-color" class="color-picker">
                        <input type="text" id="eq1-hex" class="color-hex" maxlength="7">
                    </div>
                </div>
                <div><label style="color:#00ff66;">Subtexto Eq 1 (Opcional)</label><input type="text" id="eq1-sub" placeholder="Dejar vacío para ocultar"></div>
                
                <div class="manual-points-box">
                    <div class="mp-header">
                        <span class="mp-title">Puntos Actuales:</span>
                        <span class="mp-score" id="lbl-pts-eq1" style="color:#00ff66;">0</span>
                    </div>
                    <div class="mp-controls">
                        <input type="number" id="manual-pts-eq1" class="mp-input" placeholder="Ej. 100">
                        <button class="btn-mp" style="background:#00ff66; color:black;" onclick="modificarPuntos(1, 'sumar')" title="Sumar"><i class="fa-solid fa-plus"></i></button>
                        <button class="btn-mp" style="background:#ff003c; color:white;" onclick="modificarPuntos(1, 'restar')" title="Restar"><i class="fa-solid fa-minus"></i></button>
                    </div>
                </div>

                <label style="color:#ccc;">Asignar Regalos (Eq 1)</label>
                <div style="display: flex; gap: 10px;"><select id="select-eq1"></select><button class="btn-add" onclick="addGift(1)">Añadir</button></div>
                <div class="assigned-list" id="list-eq1"></div>
            </div>

            <div class="team-col">
                <div><label style="color:#ff003c;" id="lbl-eq2">Nombre Eq 2</label><input type="text" id="eq2-nombre"></div>
                <div><label style="color:#ccc;">Color de Equipo</label>
                    <div class="color-selector">
                        <input type="color" id="eq2-color" class="color-picker">
                        <input type="text" id="eq2-hex" class="color-hex" maxlength="7">
                    </div>
                </div>
                <div><label style="color:#ff003c;">Subtexto Eq 2 (Opcional)</label><input type="text" id="eq2-sub" placeholder="Dejar vacío para ocultar"></div>
                
                <div class="manual-points-box">
                    <div class="mp-header">
                        <span class="mp-title">Puntos Actuales:</span>
                        <span class="mp-score" id="lbl-pts-eq2" style="color:#ff003c;">0</span>
                    </div>
                    <div class="mp-controls">
                        <input type="number" id="manual-pts-eq2" class="mp-input" placeholder="Ej. 100">
                        <button class="btn-mp" style="background:#00ff66; color:black;" onclick="modificarPuntos(2, 'sumar')" title="Sumar"><i class="fa-solid fa-plus"></i></button>
                        <button class="btn-mp" style="background:#ff003c; color:white;" onclick="modificarPuntos(2, 'restar')" title="Restar"><i class="fa-solid fa-minus"></i></button>
                    </div>
                </div>

                <label style="color:#ccc;">Asignar Regalos (Eq 2)</label>
                <div style="display: flex; gap: 10px;"><select id="select-eq2"></select><button class="btn-add" onclick="addGift(2)">Añadir</button></div>
                <div class="assigned-list" id="list-eq2"></div>
            </div>
        </div>
    </div>

    <div class="box">
        <h3><i class="fa-solid fa-palette"></i> Diseño del Overlay</h3>
        <div class="design-grid">
            <div class="design-item">
                <label style="color:#ccc;">Tipografía y Borde</label>
                <select id="ds-font" style="margin-bottom: 5px;">
                    <option value="'Lemon', serif">Lemon (Curvas Gorditas)</option>
                    <option value="'Luckiest Guy', cursive">Luckiest Guy (Gaming)</option>
                    <option value="'Bebas Neue', cursive">Bebas Neue (Impactante)</option>
                    <option value="'Oswald', sans-serif">Oswald (Fuerte)</option>
                    <option value="'Lilita One', cursive">Lilita One (Gordita)</option>
                    <option value="'Teko', sans-serif">Teko (Tecno)</option>
                    <option value="'Russo One', sans-serif">Russo One (Sci-Fi)</option>
                    <option value="'Anton', sans-serif">Anton (Titular)</option>
                    <option value="'Montserrat', sans-serif">Montserrat (Moderna)</option>
                </select>
                <label style="color:#aaa; font-size:10px;">Grosor Borde Negro</label>
                <input type="number" id="ds-stroke" step="0.5" placeholder="Ej. 1.5">
            </div>

            <div class="design-item">
                <label style="color:#ccc;">Sombras (Text Shadow)</label>
                <label style="color:#aaa; font-size:10px;">Opacidad (0.0 a 1.0)</label>
                <input type="number" id="ds-shadow-op" step="0.1" min="0" max="1" placeholder="Ej. 0.8">
                <label style="color:#aaa; font-size:10px; margin-top:5px;">Distancia de Sombra (px)</label>
                <input type="number" id="ds-shadow-dist" step="1" placeholder="Ej. 4">
            </div>

            <div class="design-item" style="border-top: 3px solid #ffd700;">
                <label style="color:#ffd700;">Línea 1 (XX para salvar)</label>
                <label style="color:#aaa; font-size:10px;">Color</label>
                <input type="color" id="ds-c1">
                <label style="color:#aaa; font-size:10px; margin-top:5px;">Tamaño Texto (px)</label>
                <input type="number" id="ds-s1">
            </div>

            <div class="design-item" style="border-top: 3px solid #ff003c;">
                <label style="color:#ff003c;">Línea 2 (Reiniciando en)</label>
                <label style="color:#aaa; font-size:10px;">Color</label>
                <input type="color" id="ds-c2">
                <label style="color:#aaa; font-size:10px; margin-top:5px;">Tamaño Texto (px)</label>
                <input type="number" id="ds-s2">
            </div>

            <div class="design-item" style="border-top: 3px solid #ffffff;">
                <label style="color:#ffffff;">Números (Segundos)</label>
                <label style="color:#aaa; font-size:10px;">Color</label>
                <input type="color" id="ds-ct">
                <label style="color:#aaa; font-size:10px; margin-top:5px;">Tamaño Texto (px)</label>
                <input type="number" id="ds-st">
            </div>
        </div>

        <!-- 🌟 CAMBIO 2: BOTONES DE IMPORTAR Y EXPORTAR JSON -->
        <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button class="btn-guardar" onclick="guardarConfig(false)" style="flex: 2;"><i class="fa-solid fa-floppy-disk"></i> Guardar Todo en Vivo</button>
            <button class="btn-guardar" onclick="exportarJSON()" style="flex: 1; background: #ffaa00; color: black;"><i class="fa-solid fa-download"></i> Exportar Config</button>
            <button class="btn-guardar" onclick="document.getElementById('import-file').click()" style="flex: 1; background: #cc00ff; color: white;"><i class="fa-solid fa-upload"></i> Importar Config</button>
            <input type="file" id="import-file" style="display:none;" accept=".json" onchange="importarJSON(event)">
        </div>

        <!-- 🌟 CAMBIO 4: BOTONES DEL POP DE REGALOS INCLUIDOS -->
        <div class="overlay-bar">
            <button class="btn-overlay" onclick="window.open('/salvar', '_blank')"><i class="fa-solid fa-eye"></i> Abrir Batalla</button>
            <button class="btn-overlay" style="color:#ffd700; border-color:#ffd700;" onclick="copiarURL('/salvar')"><i class="fa-solid fa-link"></i> URL Batalla</button>
            <button class="btn-overlay" style="color:#b3e5fc; border-color:#b3e5fc;" onclick="window.open('/regalos_versus.html', '_blank')"><i class="fa-solid fa-eye"></i> Abrir Regalos Pop</button>
            <button class="btn-overlay" style="color:#ff99cc; border-color:#ff99cc;" onclick="copiarURL('/regalos_versus.html')"><i class="fa-solid fa-link"></i> URL Regalos Pop</button>
        </div>
        
        <p id="mensaje" style="color:#00ff66; text-align:center; display:none; font-weight:bold;">✅ ¡Guardado y Aplicado!</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let globalGifts = []; let eq1Gifts = []; let eq2Gifts = [];
        
        function syncColors(pickerId, hexId, labelId) {
            const picker = document.getElementById(pickerId);
            const hex = document.getElementById(hexId);
            const lbl = document.getElementById(labelId);
            
            picker.addEventListener('input', (e) => { 
                hex.value = e.target.value.toUpperCase(); 
                lbl.style.color = e.target.value; 
            });
            hex.addEventListener('input', (e) => { 
                let val = e.target.value; 
                if(/^#[0-9A-F]{6}$/i.test(val)) { 
                    picker.value = val; 
                    lbl.style.color = val; 
                } 
            });
        }
        syncColors('eq1-color', 'eq1-hex', 'lbl-eq1');
        syncColors('eq2-color', 'eq2-hex', 'lbl-eq2');

        function renderDropdowns() {
            let s1 = document.getElementById('select-eq1'); 
            let s2 = document.getElementById('select-eq2');
            let val1 = s1.value;
            let val2 = s2.value;
            
            s1.innerHTML = ''; s2.innerHTML = '';
            
            globalGifts.forEach(g => { 
                let enEq1 = eq1Gifts.some(r => r.id === g.id);
                let enEq2 = eq2Gifts.some(r => r.id === g.id);
                
                let textoAdd = "";
                let styleBg = "";
                
                if (enEq1) { 
                    textoAdd = " ✅ [En Eq 1]"; 
                    styleBg = "background-color: #003311; color: #00ff66;"; 
                } else if (enEq2) { 
                    textoAdd = " ✅ [En Eq 2]"; 
                    styleBg = "background-color: #330011; color: #ff003c;"; 
                }
                
                let opt = `<option value="${g.id}" style="${styleBg}">[ID: ${g.id}] ${g.name} (${g.diamonds} Monedas)${textoAdd}</option>`; 
                s1.innerHTML += opt; 
                s2.innerHTML += opt; 
            });

            if(val1) s1.value = val1;
            if(val2) s2.value = val2;
        }

        socket.on('config_actual', (config) => {
            document.getElementById('input-countdown-sec').value = config.countdownSeconds || 30;
            document.getElementById('check-countdown').checked = config.enableCountdown;
            document.getElementById('check-round').checked = config.roundGifts !== false; 
            document.getElementById('check-top-donators').checked = config.showTopDonators !== false; 
            document.getElementById('check-toptext').checked = config.showTopText !== false;
            document.getElementById('check-coins').checked = config.showDonatorCoins;
            document.getElementById('check-emoticons').checked = config.showEmoticons !== undefined ? config.showEmoticons : true;
            document.getElementById('eq1-nombre').value = config.equipo1.nombre; document.getElementById('eq1-sub').value = config.equipo1.sub || "";
            document.getElementById('eq2-nombre').value = config.equipo2.nombre; document.getElementById('eq2-sub').value = config.equipo2.sub || "";
            
            let c1 = config.equipo1.color || "#00ff66";
            let c2 = config.equipo2.color || "#ff003c";
            document.getElementById('eq1-color').value = c1; document.getElementById('eq1-hex').value = c1.toUpperCase(); document.getElementById('lbl-eq1').style.color = c1;
            document.getElementById('eq2-color').value = c2; document.getElementById('eq2-hex').value = c2.toUpperCase(); document.getElementById('lbl-eq2').style.color = c2;

            if(config.battleStyle) {
                document.getElementById('ds-font').value = config.battleStyle.fontFamily;
                document.getElementById('ds-stroke').value = config.battleStyle.textStroke;
                document.getElementById('ds-shadow-op').value = config.battleStyle.shadowOpacity !== undefined ? config.battleStyle.shadowOpacity : 1.0;
                document.getElementById('ds-shadow-dist').value = config.battleStyle.shadowDistance !== undefined ? config.battleStyle.shadowDistance : 4;
                document.getElementById('ds-c1').value = config.battleStyle.colorL1;
                document.getElementById('ds-s1').value = config.battleStyle.sizeL1;
                document.getElementById('ds-c2').value = config.battleStyle.colorL2;
                document.getElementById('ds-s2').value = config.battleStyle.sizeL2;
                document.getElementById('ds-ct').value = config.battleStyle.colorTimer;
                document.getElementById('ds-st').value = config.battleStyle.sizeTimer;
            }

            globalGifts = config.regalosDisponibles || []; 
            eq1Gifts = config.equipo1.regalos || []; 
            eq2Gifts = config.equipo2.regalos || [];
            
            renderDropdowns();
            renderList(1); renderList(2);
        });

        socket.on('actualizacion_salvar', (data) => {
            document.getElementById('lbl-pts-eq1').innerText = data.totalSalvar;
            document.getElementById('lbl-pts-eq2').innerText = data.totalReiniciar;
        });

        function modificarPuntos(equipo, accion) {
            let inputId = equipo === 1 ? 'manual-pts-eq1' : 'manual-pts-eq2';
            let pts = parseInt(document.getElementById(inputId).value);
            if (isNaN(pts) || pts <= 0) return;
            
            let cantidad = accion === 'sumar' ? pts : -pts;
            socket.emit('modificar_puntos_equipo', { equipo: equipo, cantidad: cantidad });
            
            // 🌟 CAMBIO 3: Ya no limpiamos el input para que se quede el "100" allí y puedas hacer clics seguidos
            // document.getElementById(inputId).value = ''; 
        }

        function resetearValores() {
            if(confirm("🚨 ¿Estás seguro de reiniciar todos los puntos y MVPs de la batalla a cero?")) {
                socket.emit('reset');
            }
        }

        function renderList(team) {
            let container = document.getElementById(team === 1 ? 'list-eq1' : 'list-eq2');
            let arr = team === 1 ? eq1Gifts : eq2Gifts; container.innerHTML = '';
            arr.forEach(g => { container.innerHTML += `<div class="assigned-item"><span>${g.name} (<i class="fa-solid fa-coins" style="color:#ffd700;"></i> ${g.diamonds})</span><button class="btn-remove" onclick="removeGift(${team}, ${g.id})"><i class="fa-solid fa-xmark"></i></button></div>`; });
        }

        function addGift(team) {
            let sel = document.getElementById(team === 1 ? 'select-eq1' : 'select-eq2');
            if(!sel.value) return;
            let gift = globalGifts.find(g => g.id === parseInt(sel.value));
            let arr = team === 1 ? eq1Gifts : eq2Gifts;
            if (!arr.some(g => g.id === gift.id)) { 
                arr.push(gift); 
                renderList(team); 
                renderDropdowns(); 
                guardarConfig(true); 
            }
        }

        function removeGift(team, id) {
            if (team === 1) eq1Gifts = eq1Gifts.filter(g => g.id !== id); else eq2Gifts = eq2Gifts.filter(g => g.id !== id);
            renderList(team);
            renderDropdowns();
            guardarConfig(true); 
        }

        function guardarConfig(isSilent = false) {
            let configStyle = {
                fontFamily: document.getElementById('ds-font').value,
                textStroke: parseFloat(document.getElementById('ds-stroke').value) || 1.5,
                shadowOpacity: parseFloat(document.getElementById('ds-shadow-op').value),
                shadowDistance: parseInt(document.getElementById('ds-shadow-dist').value) || 4,
                colorL1: document.getElementById('ds-c1').value,
                sizeL1: parseInt(document.getElementById('ds-s1').value) || 38,
                colorL2: document.getElementById('ds-c2').value,
                sizeL2: parseInt(document.getElementById('ds-s2').value) || 45,
                colorTimer: document.getElementById('ds-ct').value,
                sizeTimer: parseInt(document.getElementById('ds-st').value) || 140
            };

            let c1 = document.getElementById('eq1-hex').value;
            let c2 = document.getElementById('eq2-hex').value;

            socket.emit('guardar_config', {
                equipo1: { nombre: document.getElementById('eq1-nombre').value.trim(), sub: document.getElementById('eq1-sub').value.trim(), color: c1, regalos: eq1Gifts },
                equipo2: { nombre: document.getElementById('eq2-nombre').value.trim(), sub: document.getElementById('eq2-sub').value.trim(), color: c2, regalos: eq2Gifts },
                enableCountdown: document.getElementById('check-countdown').checked, 
                showTopText: document.getElementById('check-toptext').checked, 
                showDonatorCoins: document.getElementById('check-coins').checked, 
                showEmoticons: document.getElementById('check-emoticons').checked,
                roundGifts: document.getElementById('check-round').checked, 
                showTopDonators: document.getElementById('check-top-donators').checked, 
                countdownSeconds: parseInt(document.getElementById('input-countdown-sec').value) || 30,
                battleStyle: configStyle
            });
            
            if (!isSilent) {
                document.getElementById('mensaje').style.display = 'block'; 
                setTimeout(() => document.getElementById('mensaje').style.display = 'none', 2000);
            }
        }

        // 🌟 LÓGICA DE EXPORTAR JSON (Solo datos del panel Versus)
        function exportarJSON() {
            let configToExport = {
                equipo1: {
                    nombre: document.getElementById('eq1-nombre').value.trim(),
                    sub: document.getElementById('eq1-sub').value.trim(),
                    color: document.getElementById('eq1-hex').value,
                    regalos: eq1Gifts
                },
                equipo2: {
                    nombre: document.getElementById('eq2-nombre').value.trim(),
                    sub: document.getElementById('eq2-sub').value.trim(),
                    color: document.getElementById('eq2-hex').value,
                    regalos: eq2Gifts
                },
                enableCountdown: document.getElementById('check-countdown').checked,
                showTopText: document.getElementById('check-toptext').checked,
                showDonatorCoins: document.getElementById('check-coins').checked,
                showEmoticons: document.getElementById('check-emoticons').checked,
                roundGifts: document.getElementById('check-round').checked,
                showTopDonators: document.getElementById('check-top-donators').checked,
                countdownSeconds: parseInt(document.getElementById('input-countdown-sec').value) || 30,
                battleStyle: {
                    fontFamily: document.getElementById('ds-font').value,
                    textStroke: parseFloat(document.getElementById('ds-stroke').value) || 1.5,
                    shadowOpacity: parseFloat(document.getElementById('ds-shadow-op').value) || 1.0,
                    shadowDistance: parseInt(document.getElementById('ds-shadow-dist').value) || 4,
                    colorL1: document.getElementById('ds-c1').value,
                    sizeL1: parseInt(document.getElementById('ds-s1').value) || 38,
                    colorL2: document.getElementById('ds-c2').value,
                    sizeL2: parseInt(document.getElementById('ds-s2').value) || 45,
                    colorTimer: document.getElementById('ds-ct').value,
                    sizeTimer: parseInt(document.getElementById('ds-st').value) || 140
                }
            };

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(configToExport, null, 4));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "configuracion_batalla.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // 🌟 LÓGICA DE IMPORTAR JSON
        function importarJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if(data.countdownSeconds !== undefined) document.getElementById('input-countdown-sec').value = data.countdownSeconds;
                    if(data.enableCountdown !== undefined) document.getElementById('check-countdown').checked = data.enableCountdown;
                    if(data.roundGifts !== undefined) document.getElementById('check-round').checked = data.roundGifts;
                    if(data.showTopDonators !== undefined) document.getElementById('check-top-donators').checked = data.showTopDonators;
                    if(data.showTopText !== undefined) document.getElementById('check-toptext').checked = data.showTopText;
                    if(data.showDonatorCoins !== undefined) document.getElementById('check-coins').checked = data.showDonatorCoins;
                    if(data.showEmoticons !== undefined) document.getElementById('check-emoticons').checked = data.showEmoticons;

                    if(data.equipo1) {
                        document.getElementById('eq1-nombre').value = data.equipo1.nombre || "";
                        document.getElementById('eq1-sub').value = data.equipo1.sub || "";
                        if(data.equipo1.color) {
                            document.getElementById('eq1-color').value = data.equipo1.color;
                            document.getElementById('eq1-hex').value = data.equipo1.color.toUpperCase();
                            document.getElementById('lbl-eq1').style.color = data.equipo1.color;
                        }
                        eq1Gifts = data.equipo1.regalos || [];
                    }

                    if(data.equipo2) {
                        document.getElementById('eq2-nombre').value = data.equipo2.nombre || "";
                        document.getElementById('eq2-sub').value = data.equipo2.sub || "";
                        if(data.equipo2.color) {
                            document.getElementById('eq2-color').value = data.equipo2.color;
                            document.getElementById('eq2-hex').value = data.equipo2.color.toUpperCase();
                            document.getElementById('lbl-eq2').style.color = data.equipo2.color;
                        }
                        eq2Gifts = data.equipo2.regalos || [];
                    }

                    if(data.battleStyle) {
                        document.getElementById('ds-font').value = data.battleStyle.fontFamily || "'Lemon', serif";
                        document.getElementById('ds-stroke').value = data.battleStyle.textStroke || 1.5;
                        document.getElementById('ds-shadow-op').value = data.battleStyle.shadowOpacity !== undefined ? data.battleStyle.shadowOpacity : 1.0;
                        document.getElementById('ds-shadow-dist').value = data.battleStyle.shadowDistance !== undefined ? data.battleStyle.shadowDistance : 4;
                        document.getElementById('ds-c1').value = data.battleStyle.colorL1 || "#ffd700";
                        document.getElementById('ds-s1').value = data.battleStyle.sizeL1 || 38;
                        document.getElementById('ds-c2').value = data.battleStyle.colorL2 || "#ff003c";
                        document.getElementById('ds-s2').value = data.battleStyle.sizeL2 || 45;
                        document.getElementById('ds-ct').value = data.battleStyle.colorTimer || "#ffffff";
                        document.getElementById('ds-st').value = data.battleStyle.sizeTimer || 140;
                    }

                    renderDropdowns();
                    renderList(1);
                    renderList(2);
                    guardarConfig(false); // Guarda y envía los datos importados al servidor automáticamente
                    
                    alert("✅ Configuración importada con éxito.");
                } catch(err) {
                    alert("❌ Error al leer el archivo JSON.");
                }
            };
            reader.readAsText(file);
            event.target.value = ""; // Limpia el input por si quieres volver a cargar el mismo archivo luego
        }

        function copiarURL(path) {
            navigator.clipboard.writeText(window.location.origin + path);
            alert("✅ Enlace copiado: " + window.location.origin + path + "\n\nPégalo como Navegador en OBS.");
        }
    </script>
