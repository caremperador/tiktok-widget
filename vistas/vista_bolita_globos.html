<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f0f13; color: white; font-family: 'Segoe UI', sans-serif; padding: 40px; margin: 0; }
        .box { background: #1a1a24; border: 1px solid #333; border-radius: 12px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); max-width: 900px; margin-bottom: 30px;}
        .header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px;}
        h2 { margin: 0; color: #00f2fe; font-size: 18px;}
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; color: #aaa;}
        input[type="number"], input[type="text"] { width: 100%; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; font-size: 14px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #00f2fe; }

        .btn-save { background: #00ff66; color: black; font-weight: bold; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 14px;}
        .btn-save:hover { background: #00cc55; }
        .btn-export { background: #00f2fe; color: black; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px;}
        .btn-import { background: #ffaa00; color: black; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px;}

        /* CSS para el Switch/Toggle */
        .switch-container { display: flex; align-items: center; gap: 15px; background: rgba(0, 242, 254, 0.1); padding: 15px; border-radius: 8px; border: 1px solid #00f2fe; margin-bottom: 25px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ff003c; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00ff66; }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

    <input type="file" id="file-import" accept=".json" style="display:none;" onchange="importarConfig(event)">

    <div class="box">
        <div class="header-row">
            <h2><i class="fa-solid fa-gears"></i> Configuración General del Juego</h2>
            <div style="display: flex; gap: 10px;">
                <button class="btn-import" onclick="document.getElementById('file-import').click()"><i class="fa-solid fa-upload"></i> Importar JSON</button>
                <button class="btn-export" onclick="exportarConfig()"><i class="fa-solid fa-download"></i> Exportar JSON</button>
            </div>
        </div>

        <!-- 🌟 SWITCH DE COSAS GRATIS -->
        <div class="switch-container">
            <label class="switch">
                <input type="checkbox" id="inp-allow-free">
                <span class="slider"></span>
            </label>
            <div>
                <strong style="color: #fff; font-size: 14px;">Habilitar cosas Gratis (Chat, Likes, Follows)</strong>
                <p style="margin: 3px 0 0 0; font-size: 12px; color: #ccc;">Apágalo cuando quieras ganar la partida. Los regalos con monedas seguirán funcionando.</p>
            </div>
        </div>
        
        <div class="grid-2">
            <!-- REGALOS -->
            <div>
                <h3 style="color: #ffd700; font-size: 14px;"><i class="fa-solid fa-gift"></i> Regalos</h3>
                <div class="input-group">
                    <label>Multiplicador de Monedas (Ej: 1 Moneda = X Globos)</label>
                    <input type="number" id="inp-multiplicador" value="2" min="1">
                </div>
                <div class="input-group" style="margin-top: 25px; border-top: 1px solid #333; padding-top: 15px;">
                    <label>💖 Regalo Específico: Quiéreme (Heart Me) [ID: 7934]</label>
                    <input type="number" id="inp-quiereme" value="60" min="0" placeholder="Ej: 60 globos">
                </div>
            </div>

            <!-- CHAT -->
            <div>
                <h3 style="color: #00f2fe; font-size: 14px;"><i class="fa-solid fa-comment"></i> Comandos en el Chat (Modo Sigilo)</h3>
                <div class="input-group">
                    <label>Palabras Clave (Separadas por coma)</label>
                    <input type="text" id="inp-chat-word" value="globos, jugar">
                </div>
                <div class="input-group">
                    <label>Globos al detectar una palabra</label>
                    <input type="number" id="inp-chat-globos" value="1" min="0">
                </div>
                <div class="input-group">
                    <label>Cooldown por usuario (Segundos)</label>
                    <input type="number" id="inp-chat-cooldown" value="60" min="0">
                </div>
            </div>

            <!-- FOLLOWS -->
            <div>
                <h3 style="color: #ffaa00; font-size: 14px;"><i class="fa-solid fa-user-plus"></i> Seguidores / Follows (Modo Sigilo)</h3>
                <div class="input-group">
                    <label>Globos por cada nuevo Seguidor</label>
                    <input type="number" id="inp-follow" value="5" min="0">
                </div>
                <div class="input-group">
                    <label>Antispam: Cooldown por usuario (Segundos)</label>
                    <input type="number" id="inp-follow-cooldown" value="300" min="0">
                </div>
            </div>

            <!-- LIKES (TAP TAP) -->
            <div>
                <h3 style="color: #ff0050; font-size: 14px;"><i class="fa-solid fa-heart"></i> Likes / Tap Tap (Modo Sigilo)</h3>
                <div class="input-group">
                    <label>Meta de Likes INDIVIDUAL por ráfaga</label>
                    <input type="number" id="inp-likes-meta" value="50" min="1">
                </div>
                <div class="input-group">
                    <label>Globos al cumplir la ráfaga de Likes</label>
                    <input type="number" id="inp-likes-globos" value="1" min="0">
                </div>
            </div>
        </div>

        <div style="margin-top: 20px; text-align: right;">
            <button class="btn-save" onclick="guardarConfig()"><i class="fa-solid fa-floppy-disk"></i> Guardar Cambios</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let configDescarga = {};

        socket.on('config_actual', (config) => {
            if (config && config.bolita) {
                configDescarga = config.bolita;
                document.getElementById('inp-allow-free').checked = config.bolita.allowFree !== false; // true por defecto
                document.getElementById('inp-multiplicador').value = config.bolita.multiplicador !== undefined ? config.bolita.multiplicador : 2;
                document.getElementById('inp-quiereme').value = config.bolita.quiereMeGlobos !== undefined ? config.bolita.quiereMeGlobos : 60;
                document.getElementById('inp-follow').value = config.bolita.followGlobos !== undefined ? config.bolita.followGlobos : 5;
                document.getElementById('inp-follow-cooldown').value = config.bolita.followCooldown !== undefined ? config.bolita.followCooldown : 300;
                document.getElementById('inp-chat-word').value = config.bolita.chatWord !== undefined ? config.bolita.chatWord : "globos";
                document.getElementById('inp-chat-globos').value = config.bolita.chatGlobos !== undefined ? config.bolita.chatGlobos : 1;
                document.getElementById('inp-chat-cooldown').value = config.bolita.chatCooldown !== undefined ? config.bolita.chatCooldown : 60;
                document.getElementById('inp-likes-meta').value = config.bolita.likesMeta !== undefined ? config.bolita.likesMeta : 50;
                document.getElementById('inp-likes-globos').value = config.bolita.likesGlobos !== undefined ? config.bolita.likesGlobos : 1;
            }
        });

        function obtenerValoresInput() {
            return {
                allowFree: document.getElementById('inp-allow-free').checked,
                multiplicador: parseInt(document.getElementById('inp-multiplicador').value) || 2,
                quiereMeGlobos: parseInt(document.getElementById('inp-quiereme').value) || 0,
                followGlobos: parseInt(document.getElementById('inp-follow').value) || 0,
                followCooldown: parseInt(document.getElementById('inp-follow-cooldown').value) || 300,
                chatWord: document.getElementById('inp-chat-word').value.trim() || "globos",
                chatGlobos: parseInt(document.getElementById('inp-chat-globos').value) || 0,
                chatCooldown: parseInt(document.getElementById('inp-chat-cooldown').value) || 60,
                likesMeta: parseInt(document.getElementById('inp-likes-meta').value) || 50,
                likesGlobos: parseInt(document.getElementById('inp-likes-globos').value) || 0
            };
        }

        function guardarConfig() {
            const nuevaConfig = obtenerValoresInput();
            socket.emit('guardar_config_bolita', nuevaConfig);
            alert("✅ Configuración guardada en el servidor.");
        }

        function exportarConfig() {
            const dataStr = JSON.stringify(obtenerValoresInput(), null, 4);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "config_bolita_globos.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importarConfig(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const jsonData = JSON.parse(event.target.result);
                    socket.emit('guardar_config_bolita', jsonData);
                    alert("✅ Configuración importada exitosamente.");
                } catch(err) { alert("❌ Error al leer el archivo JSON."); }
            };
            reader.readAsText(file);
            e.target.value = ''; 
        }
    </script>
</body>
</html>
