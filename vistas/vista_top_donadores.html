<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f0f13; color: white; font-family: 'Segoe UI', sans-serif; padding: 40px; margin: 0; }
        .box { background: #1a1a24; border: 1px solid #333; border-radius: 12px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); max-width: 1000px;}
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #222; padding: 15px; border-radius: 8px;}
        
        .racha-layout { display: flex; gap: 20px; align-items: flex-start;}
        .racha-col { flex: 1; background: #222; border: 1px solid #444; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; max-height: 500px;}
        .racha-col h3 { text-align: center; margin-top: 0; font-size: 16px; color: #fff; border-bottom: 1px solid #444; padding-bottom: 10px; text-transform: uppercase;}
        
        .user-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px;}
        .user-list::-webkit-scrollbar { width: 5px; }
        .user-list::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }

        .user-item { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; gap: 10px;}
        .user-info { display: flex; align-items: center; gap: 10px; overflow: hidden;}
        .user-info img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover;}
        .user-info div { display: flex; flex-direction: column; }
        .u-name { font-weight: bold; font-size: 13px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px;}
        .u-data { font-size: 12px; color: #ffd700; font-weight: bold;}
        
        .btn-ctrl { background: #333; border: none; color: white; width: 28px; height: 28px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center;}
        .btn-ctrl:hover { background: #555;}
        .btn-del { color: #ff003c; }
        .btn-del:hover { background: #ff003c; color: white; }

        .btn-action { width: 100%; padding: 15px; font-weight: bold; border: none; cursor: pointer; border-radius: 8px; text-transform: uppercase; margin-top: 10px; font-size: 14px;}
        .btn-primary { background: #00f2fe; color: black; }
        .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }
        .btn-danger { background: #444; color: white; }
        .btn-danger:hover { background: #ff003c; }

        .btn-overlay { padding: 10px 15px; background: #222; color: #ffd700; font-size: 13px; font-weight: bold; border: 1px solid #ffd700; cursor: pointer; border-radius: 8px;}
        .btn-overlay:hover { background: #ffd700; color: black;}
    </style>
</head>
<body>
    <div class="box">
        <div class="top-row">
            <div><h3 style="margin: 0; color: #ffd700;"><i class="fa-solid fa-gem"></i> Gestión Top Donadores VIP</h3></div>
            <div style="display:flex; gap: 10px;">
                <button class="btn-overlay" style="color:#00ff66; border-color:#00ff66;" onclick="window.open('/top_donadores', '_blank')"><i class="fa-solid fa-eye"></i> Ver Overlay</button>
                <button class="btn-overlay" onclick="copiarURL()"><i class="fa-solid fa-link"></i> Copiar URL OBS</button>
            </div>
        </div>

        <div class="racha-layout">
            <div class="racha-col" style="border-color: #ffd700;">
                
                <div style="margin-bottom: 15px; background: #111; padding: 10px; border-radius: 8px; border: 1px solid #333;">
                    <label style="color:#00f2fe; margin-bottom: 5px; font-size: 11px;">Ajustes del Overlay</label>
                    <div style="display:flex; gap:10px; align-items: center;">
                        <input type="number" id="inp-vip-limit" min="1" max="10" value="2" style="margin:0; width:60px; text-align:center;" title="Cantidad a mostrar">
                        <label style="margin:0; color:#fff; display:flex; align-items:center; gap:5px; font-size:12px; cursor:pointer;">
                            <input type="checkbox" id="inp-vip-mirror" style="width:16px; height:16px; accent-color: #00f2fe;"> Modo Espejo
                        </label>
                        <button class="btn-ctrl" style="width:auto; padding:0 15px; background:#00f2fe; color:black; font-size: 12px; margin-left:auto;" onclick="guardarOpcionesVIP()"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
                    </div>
                </div>

                <h3 style="color:#ffd700;">Ronda Actual (Monedas)</h3>
                <div class="user-list" id="lista-ronda"></div>
                
                <button class="btn-action btn-primary" style="background:#ffd700;" onclick="cerrarRondaGlobal()"><i class="fa-solid fa-trophy"></i> Cerrar Ronda Global (+1 Win)</button>
                <button class="btn-action btn-danger" onclick="limpiarRonda()"><i class="fa-solid fa-eraser"></i> Limpiar Ronda Actual</button>
            </div>

            <div class="racha-col" style="border-color: #ffaa00;">
                <h3 style="color:#ffaa00;">Historial de Victorias</h3>
                <div class="user-list" id="lista-historial"></div>
                
                <button class="btn-action btn-danger" onclick="limpiarHistorial()" style="margin-top: 60px;"><i class="fa-solid fa-trash-can"></i> Limpiar Todo el Historial</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        let focusKey = null;
        let focusValue = "";

        socket.on('config_actual', (config) => {
            if(config.topVIP) {
                if(config.topVIP.displayLimit) document.getElementById('inp-vip-limit').value = config.topVIP.displayLimit;
                if(config.topVIP.mirrorMode !== undefined) document.getElementById('inp-vip-mirror').checked = config.topVIP.mirrorMode;
            }
        });

        socket.on('top_vip_data_update', (data) => {
            if(!data) return;
            
            if(document.activeElement && document.activeElement.id && document.activeElement.id.startsWith('inp-coin-')) {
                focusKey = document.activeElement.id;
                focusValue = document.activeElement.value;
            } else {
                focusKey = null;
            }

            let lRonda = document.getElementById('lista-ronda'); 
            lRonda.innerHTML = '';
            
            let arrRonda = Object.entries(data.currentRound).map(([u, d]) => ({userKey: u, ...d})).sort((a,b) => b.coins - a.coins);
            
            arrRonda.forEach((u, index) => {
                let badge = index === 0 ? '<i class="fa-solid fa-crown" style="color:gold;"></i>' : `#${index + 1}`;
                lRonda.innerHTML += `
                <div class="user-item" style="${index === 0 ? 'border-color: gold; box-shadow: 0 0 10px rgba(255,215,0,0.2);' : ''}">
                    <div class="user-info">
                        <span style="font-weight:bold; color:#888; width:20px;">${badge}</span>
                        <img src="${u.avatar}">
                        <div><span class="u-name">${u.displayName}</span><span class="u-data"><i class="fa-solid fa-coins"></i> ${u.coins.toLocaleString()}</span></div>
                    </div>
                    
                    <div style="display:flex; gap:5px; align-items:center;">
                        <input type="number" id="inp-coin-${u.userKey}" style="width:45px; height:24px; margin:0; padding:0 4px; border:1px solid #555; background:#000; color:#00ff66; border-radius:4px; font-size:12px; font-weight:bold;" placeholder="+ Cant">
                        <button class="btn-ctrl" style="color:#00ff66;" onclick="sumarCoinsRonda('${u.userKey}')" title="Sumar Monedas manualmente"><i class="fa-solid fa-plus"></i></button>
                        <button class="btn-ctrl btn-del" onclick="eliminarRonda('${u.userKey}')" title="Eliminar"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                </div>`;
            });

            if(focusKey) {
                let el = document.getElementById(focusKey);
                if(el) {
                    el.focus();
                    el.value = focusValue;
                }
            }

            let lHist = document.getElementById('lista-historial'); 
            lHist.innerHTML = '';
            
            let arrHist = Object.entries(data.recordHistorico).map(([u, d]) => ({userKey: u, ...d})).sort((a,b) => b.wins - a.wins);

            arrHist.forEach(u => {
                lHist.innerHTML += `
                <div class="user-item">
                    <div class="user-info">
                        <img src="${u.avatar}">
                        <div><span class="u-name">${u.displayName}</span><span class="u-data" style="color:#ffaa00;"><i class="fa-solid fa-trophy"></i> ${u.wins} Victorias</span></div>
                    </div>
                    <div style="display:flex;gap:5px;">
                        <button class="btn-ctrl" onclick="ajustarHistorial('${u.userKey}', -1)">-</button>
                        <button class="btn-ctrl" onclick="ajustarHistorial('${u.userKey}', 1)">+</button>
                        <button class="btn-ctrl btn-del" onclick="eliminarHistorial('${u.userKey}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            });
        });

        // 🌟 SE ACTUALIZÓ PARA ENVIAR EL MODO ESPEJO
        function guardarOpcionesVIP() {
            let limit = parseInt(document.getElementById('inp-vip-limit').value) || 2;
            let mirror = document.getElementById('inp-vip-mirror').checked;
            socket.emit('top_vip_guardar_opciones', { displayLimit: limit, mirrorMode: mirror });
        }

        function sumarCoinsRonda(key) {
            let input = document.getElementById('inp-coin-' + key);
            let amount = parseInt(input.value);
            if(!isNaN(amount) && amount !== 0) {
                socket.emit('top_vip_ajuste_ronda', { userKey: key, amount: amount });
                input.value = ''; 
            }
        }

        function cerrarRondaGlobal() { 
            if(confirm("🏆 ¿Cerrar Ronda Global?\nSe le dará la victoria al Top 1 de Donadores, Top Likes y Top Regalos a la vez.")) {
                socket.emit('top_cerrar_ambas_rondas'); 
            }
        }
        function limpiarRonda() { if(confirm("🚨 ¿Limpiar todas las monedas de la ronda actual?")) socket.emit('top_vip_limpiar_ronda'); }
        function limpiarHistorial() { if(confirm("🚨 ¿Borrar TODO el historial de victorias?")) socket.emit('top_vip_limpiar_historial'); }
        
        function eliminarRonda(key) { socket.emit('top_vip_eliminar_ronda', key); }
        function eliminarHistorial(key) { if(confirm("¿Eliminar usuario del historial?")) socket.emit('top_vip_eliminar_historial', key); }
        function ajustarHistorial(key, amount) { socket.emit('top_vip_ajuste_historial', { userKey: key, amount: amount }); }

        function copiarURL() { navigator.clipboard.writeText(window.location.origin + '/top_donadores'); alert("✅ Enlace copiado!"); }
    </script>
</body>
</html>
