<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f0f13; color: white; font-family: 'Segoe UI', sans-serif; padding: 40px; margin: 0; }
        .box { background: #1a1a24; border: 1px solid #333; border-radius: 12px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); max-width: 1000px; margin-bottom: 30px;}
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #222; padding: 15px; border-radius: 8px;}
        
        .racha-layout { display: flex; gap: 20px; align-items: flex-start;}
        .racha-col { flex: 1; background: #222; border: 1px solid #444; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; max-height: 400px;}
        .racha-col h3 { text-align: center; margin-top: 0; font-size: 16px; color: #fff; border-bottom: 1px solid #444; padding-bottom: 10px;}
        
        .user-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px;}
        .user-item { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; gap: 10px;}
        .user-info { display: flex; align-items: center; gap: 10px; overflow: hidden;}
        .user-info img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover;}
        .user-info div { display: flex; flex-direction: column; }
        .u-name { font-weight: bold; font-size: 13px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px;}
        .u-data { font-size: 12px; color: #ffd700; font-weight: bold;}
        
        .btn-ctrl { background: #333; border: none; color: white; width: 28px; height: 28px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center;}
        .btn-ctrl:hover { background: #555;}
        .btn-del { color: #ff003c; }
        .btn-del:hover { background: #ff003c; color: white; }

        .btn-add-win { background: #00ff66; color: black; border: none; padding: 10px; width: 100%; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px;}
        .btn-clear { background: #444; color: white; border: none; padding: 10px; width: 100%; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px;}
        .btn-clear:hover { background: #ff003c; }

        .btn-overlay { padding: 10px 15px; background: #222; color: #ffaa00; font-size: 13px; font-weight: bold; border: 1px solid #ffaa00; cursor: pointer; border-radius: 8px;}
        .btn-overlay:hover { background: #ffaa00; color: black;}

        .btn-import { background: #ff0050; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;}
        .btn-import:hover { background: #ff3370; }
        .btn-export { background: #00ff66; color: black; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;}
        .btn-export:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

    <!-- 🌟 SECCIÓN: COPIAS DE SEGURIDAD GENERAL (data.json) -->
    <div class="box" style="border: 2px solid #00ff66;">
        <div class="top-row" style="margin-bottom: 0; background: transparent; padding: 0;">
            <h2 style="margin:0; color:#00ff66; font-size: 18px;"><i class="fa-solid fa-server"></i> Copias de Seguridad (Historiales y Rachas)</h2>
            <div style="display: flex; gap: 10px;">
                <button class="btn-export" onclick="exportarHistorial()"><i class="fa-solid fa-download"></i> Exportar data.json</button>
                <input type="file" id="file-import-data" accept=".json" style="display:none;" onchange="manejarArchivoData(event)">
                <button class="btn-import" onclick="document.getElementById('file-import-data').click()"><i class="fa-solid fa-upload"></i> Importar data.json</button>
            </div>
        </div>
        <p style="color:#aaa; font-size:13px; margin-top:10px;">Haz una copia de seguridad de tus rachas diarias, récords históricos y configuración visual antes de actualizar tu servidor en Render o GitHub.</p>
    </div>

    <!-- 🌟 SECCIÓN: RACHAS -->
    <div class="box">
        <div class="top-row">
            <div style="display:flex; gap: 20px; align-items:center;">
                <label style="cursor: pointer; font-weight: bold;"><input type="checkbox" id="opt-photo" onchange="guardarOpts()"> Mostrar Foto de Perfil</label>
                <label style="cursor: pointer; font-weight: bold;"><input type="checkbox" id="opt-coins" onchange="guardarOpts()"> Mostrar Monedas</label>
            </div>
            <div style="display:flex; gap: 10px;">
                <button class="btn-overlay" onclick="window.open('/racha', '_blank')"><i class="fa-solid fa-eye"></i> Abrir Overlay Racha</button>
                <button class="btn-overlay" onclick="copiarURL()"><i class="fa-solid fa-link"></i> Copiar URL OBS</button>
            </div>
        </div>

        <div class="racha-layout">
            <div class="racha-col" style="border-color: #00f2fe;">
                <h3 style="color:#00f2fe;">🔄 Ronda Actual</h3>
                <div class="user-list" id="lista-ronda"></div>
                <div>
                    <button class="btn-add-win" onclick="cerrarRonda()"><i class="fa-solid fa-trophy"></i> Cerrar Ronda (+1 Win al Top)</button>
                    <button class="btn-clear" onclick="iniciarRonda()"><i class="fa-solid fa-rotate-left"></i> Limpiar Ronda</button>
                </div>
            </div>

            <div class="racha-col" style="border-color: #ffaa00;">
                <h3 style="color:#ffaa00;">🔥 Historial Diario</h3>
                <div class="user-list" id="lista-diario"></div>
                <div><button class="btn-clear" onclick="cerrarRachaDiaria()"><i class="fa-solid fa-trash"></i> Cerrar Día (Borrar Todo)</button></div>
            </div>

            <div class="racha-col" style="border-color: #00ff66;">
                <h3 style="color:#00ff66;">🏆 Récord Histórico</h3>
                <div class="user-list" id="lista-historico"></div>
                <div><button class="btn-clear" onclick="cerrarRachaHistorica()"><i class="fa-solid fa-trash"></i> Borrar Histórico</button></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let configCompleta = {};

        socket.on('config_actual', (data) => {
            configCompleta = data;
            if(data.racha) {
                document.getElementById('opt-photo').checked = data.racha.showPhoto;
                document.getElementById('opt-coins').checked = data.racha.showCoins;
            }
        });

        socket.on('racha_data_update', (data) => {
            let lRonda = document.getElementById('lista-ronda'); lRonda.innerHTML = '';
            Object.values(data.topRound || {}).sort((a,b)=>b.monedas-a.monedas).forEach(u => {
                lRonda.innerHTML += `<div class="user-item"><div class="user-info"><img src="${u.avatar}"><div><span class="u-name">${u.displayName}</span><span class="u-data"><i class="fa-solid fa-coins"></i> ${u.monedas}</span></div></div></div>`;
            });

            let lDiario = document.getElementById('lista-diario'); lDiario.innerHTML = '';
            Object.values(data.recordDiario || {}).sort((a,b)=>b.wins-a.wins).forEach(u => {
                lDiario.innerHTML += `
                <div class="user-item">
                    <div class="user-info"><img src="${u.avatar}"><div><span class="u-name">${u.displayName}</span><span class="u-data" style="color:#ffaa00;">${u.wins} WINS | <i class="fa-solid fa-coins"></i> ${u.monedas || 0}</span></div></div>
                    <div style="display:flex;gap:5px;">
                        <button class="btn-ctrl" onclick="ajustarWin('diario','${u.displayName}',-1)">-</button>
                        <button class="btn-ctrl" onclick="ajustarWin('diario','${u.displayName}',1)">+</button>
                        <button class="btn-ctrl btn-del" onclick="eliminarUser('diario','${u.displayName}')" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            });

            let lHist = document.getElementById('lista-historico'); lHist.innerHTML = '';
            Object.values(data.recordHistorico || {}).sort((a,b)=>b.wins-a.wins).forEach(u => {
                lHist.innerHTML += `
                <div class="user-item">
                    <div class="user-info"><img src="${u.avatar}"><div><span class="u-name">${u.displayName}</span><span class="u-data" style="color:#00ff66;">${u.wins} WINS | <i class="fa-solid fa-coins"></i> ${u.monedas || 0}</span></div></div>
                    <div style="display:flex;gap:5px;">
                        <button class="btn-ctrl" onclick="ajustarWin('historico','${u.displayName}',-1)">-</button>
                        <button class="btn-ctrl" onclick="ajustarWin('historico','${u.displayName}',1)">+</button>
                        <button class="btn-ctrl btn-del" onclick="eliminarUser('historico','${u.displayName}')" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            });
        });

        function iniciarRonda() { socket.emit('racha_iniciar_ronda'); }
        function cerrarRonda() { socket.emit('racha_cerrar_ronda'); }
        function ajustarWin(tipo, nombre, cant) { socket.emit('racha_ajuste', { tipo: tipo, name: nombre, amount: cant }); }
        
        function eliminarUser(tipo, nombre) {
            if(confirm(`¿Eliminar a ${nombre} del récord ${tipo}?`)) {
                socket.emit('racha_eliminar_usuario', { tipo: tipo, name: nombre });
            }
        }
        function cerrarRachaHistorica() { 
            if(confirm("🚨 ¿Estás seguro de borrar TODO el Récord Histórico? Esto no se puede deshacer.")) {
                socket.emit('racha_cerrar_historico'); 
            }
        }
        
        function cerrarRachaDiaria() { if(confirm("¿Borrar Racha Diaria? (El historial se mantendrá)")) socket.emit('racha_cerrar_diaria'); }
        function guardarOpts() { socket.emit('racha_guardar_opciones', { showPhoto: document.getElementById('opt-photo').checked, showCoins: document.getElementById('opt-coins').checked }); }
        function copiarURL() { navigator.clipboard.writeText(window.location.origin + '/racha'); alert("✅ Enlace copiado!"); }

        // 🌟 LÓGICA DE EXPORTAR/IMPORTAR DATA.JSON
        function exportarHistorial() {
            if (Object.keys(configCompleta).length === 0) { alert("⚠️ No hay datos cargados en el sistema."); return; }
            let exportData = JSON.parse(JSON.stringify(configCompleta));
            delete exportData.regalosDisponibles; 
            
            const dataStr = JSON.stringify(exportData, null, 4);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = "data.json";
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function manejarArchivoData(e) {
            let file = e.target.files[0]; if (!file) return;
            let reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let jsonData = JSON.parse(e.target.result);
                    socket.emit('importar_historial', jsonData);
                    alert("✅ ¡Copia de seguridad restaurada con éxito!");
                } catch(err) { alert("❌ Error al leer el archivo de copia de seguridad."); }
            };
            reader.readAsText(file);
            document.getElementById('file-import-data').value = ''; 
        }
    </script>
</body>
</html>
