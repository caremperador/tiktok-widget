<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f0f13; color: white; font-family: 'Segoe UI', sans-serif; padding: 40px; margin: 0; }
        .box { background: #1a1a24; border: 1px solid #333; border-radius: 12px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); max-width: 900px; margin-bottom: 30px;}
        h3 { color: #fff; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 18px; }
        
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; color: #ccc;}
        input[type="text"], input[type="number"], select { width: 100%; background: #000; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 12px; font-size: 14px; box-sizing: border-box; margin-bottom: 15px; }
        input[type="color"] { width: 100%; height: 40px; background: #000; border: 1px solid #444; border-radius: 6px; padding: 2px; cursor: pointer; margin-bottom: 15px;}
        input:focus { border-color: #00f2fe; outline: none;}
        
        .checkbox-group { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; font-weight: bold; margin-bottom: 20px;}
        .checkbox-group input { width: 18px; height: 18px; accent-color: #00f2fe;}
        
        .design-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        
        .btn-guardar { width: 100%; padding: 18px; background: #00f2fe; color: black; font-size: 18px; font-weight: bold; border: none; cursor: pointer; border-radius: 8px; text-transform: uppercase; margin-bottom: 10px;}
        .btn-guardar:hover { filter: brightness(1.1); box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }
        
        .stats-box { display: flex; gap: 20px; margin-bottom: 25px;}
        .stat-card { background: #222; border: 1px solid #444; padding: 20px; border-radius: 8px; flex: 1; text-align: center;}
        .stat-card h4 { margin: 0 0 10px 0; color: #888; text-transform: uppercase; font-size: 12px;}
        .stat-card div { font-size: 36px; font-weight: 900; color: #00f2fe;}

        .btn-overlay { padding: 12px 15px; background: #222; color: #00ff66; font-size: 13px; font-weight: bold; border: 1px solid #00ff66; cursor: pointer; border-radius: 8px; width: 100%;}
        .btn-overlay:hover { background: #00ff66; color: black;}
    </style>
</head>
<body>
    <div class="box">
        <h3><i class="fa-solid fa-thumbs-up"></i> Meta de Likes Automática</h3>
        
        <div class="stats-box">
            <div class="stat-card">
                <h4>Likes Actuales del Live</h4>
                <div id="disp-current">0</div>
            </div>
            <div class="stat-card">
                <h4>Siguiente Objetivo Fijo</h4>
                <div id="disp-goal" style="color: #ffaa00;">0</div>
            </div>
        </div>

        <label class="checkbox-group"><input type="checkbox" id="ml-active"> Mostrar Meta de Likes en Pantalla (Overlay)</label>
        
        <div class="design-grid">
            <div>
                <label style="color:#ffaa00;">Texto Inicial (Opcional)</label>
                <input type="text" id="ml-prefix" placeholder="Ej. A los">

                <label style="color:#00ff66;">Primer Objetivo Manual (Opcional)</label>
                <input type="number" id="ml-first-goal" placeholder="Ej. 115000">
                <p style="font-size: 11px; color: #888; margin-top: -10px; margin-bottom: 15px;">Deja en blanco para auto-redondear con el salto.</p>

                <label style="color:#ffaa00;">Cada Cuántos Likes Cumplir Objetivo (Salto)</label>
                <input type="number" id="ml-step" placeholder="Ej. 500">

                <label style="color:#ffaa00;">Texto de Acción (Ej: REINICIO)</label>
                <input type="text" id="ml-text" placeholder="Ej. - 1 win">
            </div>

            <div style="background: #111; padding: 15px; border-radius: 8px; border: 1px solid #444;">
                <label>Tipografía del Overlay</label>
                <select id="ml-font">
                    <option value="'Luckiest Guy', cursive">Luckiest Guy (Gaming)</option>
                    <option value="'Lemon', serif">Lemon (Curvas Gorditas)</option>
                    <option value="'Bebas Neue', cursive">Bebas Neue (Impactante)</option>
                    <option value="'Lilita One', cursive">Lilita One (Gordita)</option>
                </select>

                <label>Color de Letra</label>
                <input type="color" id="ml-color">
                
                <label>Color de Sombra</label>
                <input type="color" id="ml-shadow">

                <label>Tamaño de Letra (px)</label>
                <input type="number" id="ml-size" placeholder="Ej. 45">
            </div>
        </div>

        <div style="margin-top: 25px;">
            <button class="btn-guardar" onclick="guardarConfig()"><i class="fa-solid fa-bolt"></i> GUARDAR Y ACTIVAR META</button>
            <p id="mensaje-exito" style="color:#00ff66; text-align:center; display:none; font-weight:bold; margin-top:10px;">✅ ¡Meta iniciada con éxito!</p>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn-overlay" onclick="window.open('/meta_likes', '_blank')"><i class="fa-solid fa-eye"></i> Ver Overlay</button>
            <button class="btn-overlay" style="color:#ffd700; border-color:#ffd700;" onclick="copiarURL()"><i class="fa-solid fa-link"></i> Copiar URL OBS</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on('config_actual', (config) => {
            if (config.metaLikes) {
                // 🌟 PROTECCIÓN ANTI-BORRADO: Solo actualiza el campo si NO estás escribiendo en él
                const activeId = document.activeElement ? document.activeElement.id : null;
                
                if(activeId !== 'ml-active') document.getElementById('ml-active').checked = config.metaLikes.active;
                if(activeId !== 'ml-first-goal') document.getElementById('ml-first-goal').value = config.metaLikes.firstGoal || "";
                if(activeId !== 'ml-prefix') document.getElementById('ml-prefix').value = config.metaLikes.prefixText || "A los";
                if(activeId !== 'ml-step') document.getElementById('ml-step').value = config.metaLikes.step;
                if(activeId !== 'ml-text') document.getElementById('ml-text').value = config.metaLikes.actionText;
                if(activeId !== 'ml-font') document.getElementById('ml-font').value = config.metaLikes.style.fontFamily;
                if(activeId !== 'ml-color') document.getElementById('ml-color').value = config.metaLikes.style.color;
                if(activeId !== 'ml-shadow') document.getElementById('ml-shadow').value = config.metaLikes.style.shadowColor;
                if(activeId !== 'ml-size') document.getElementById('ml-size').value = config.metaLikes.style.fontSize;
                
                document.getElementById('disp-goal').innerText = config.metaLikes.currentGoal.toLocaleString();
            }
        });

        socket.on('sync_likes_actuales', (likes) => {
            document.getElementById('disp-current').innerText = likes.toLocaleString();
        });

        socket.on('meta_likes_update', (data) => {
            document.getElementById('disp-goal').innerText = data.goal.toLocaleString();
        });

        function guardarConfig() {
            document.getElementById('ml-active').checked = true;
            
            let configToSave = {
                active: true,
                firstGoal: parseInt(document.getElementById('ml-first-goal').value) || 0,
                prefixText: document.getElementById('ml-prefix').value.trim(),
                step: parseInt(document.getElementById('ml-step').value) || 100,
                actionText: document.getElementById('ml-text').value.trim() || "REINICIO",
                currentGoal: 0, 
                style: {
                    fontFamily: document.getElementById('ml-font').value,
                    color: document.getElementById('ml-color').value,
                    shadowColor: document.getElementById('ml-shadow').value,
                    fontSize: parseInt(document.getElementById('ml-size').value) || 45
                }
            };
            
            socket.emit('guardar_meta_likes', { config: configToSave });
            
            let msg = document.getElementById('mensaje-exito');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 4000);
        }

        function copiarURL() {
            navigator.clipboard.writeText(window.location.origin + '/meta_likes');
            alert("✅ Enlace copiado: " + window.location.origin + "/meta_likes");
        }
    </script>
</body>
</html>
