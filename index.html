<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gatijuegos App - V1.4.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0f0f13; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden;}
        
        /* BARRA LATERAL */
        .sidebar { width: 260px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .logo { padding: 25px 20px 5px 20px; font-size: 22px; font-weight: 900; color: #00f2fe; text-transform: uppercase; text-align: center; letter-spacing: 1px;}
        .sidebar-status { text-align: center; font-size: 11px; font-weight: bold; margin-bottom: 10px; padding-bottom: 15px; border-bottom: 1px solid #333; color: #ff003c; text-transform: uppercase; letter-spacing: 1px;}
        
        .menu-group { padding: 15px 15px 5px 15px; font-size: 12px; color: #888; text-transform: uppercase; font-weight: bold;}
        .menu-item { margin: 5px 15px; padding: 12px 15px; cursor: pointer; border-radius: 8px; font-size: 14px; color: #ccc; transition: 0.2s; display: flex; align-items: center; gap: 10px;}
        .menu-item:hover { background: #2a2a2a; color: #fff;}
        .menu-item.active { background: linear-gradient(90deg, #00f2fe22, transparent); color: #00f2fe; border-left: 4px solid #00f2fe; border-radius: 0 8px 8px 0; font-weight: bold;}
        
        .sidebar-version { margin-top: auto; padding: 20px; text-align: center; font-size: 12px; color: #555; font-weight: bold; border-top: 1px solid #333;}

        /* CONTENIDO Y PESTAÑAS */
        .content { flex: 1; position: relative; background: #0f0f13;}
        .tab-content { display: none; width: 100%; height: 100%; border: none; }
        .tab-content.active { display: block; }
        
        /* UI DE CONEXIÓN */
        .conexion-wrapper { padding: 40px; }
        .status-bar { background: #000; padding: 15px; border-radius: 8px; border: 1px solid #444; font-family: monospace; font-size: 16px; margin-bottom: 20px; color: #ccc; text-align: center; max-width: 800px; font-weight: bold;}
        .box { background: #1a1a24; border: 1px solid #333; border-radius: 12px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); max-width: 800px;}
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; color: #ffd700;}
        input[type="text"] { width: 100%; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; font-size: 14px; box-sizing: border-box; margin-bottom: 15px;}
        input:focus { outline: none; border-color: #00f2fe; }
        .btn-play { background: #00ff66; color: black; font-weight: bold; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; flex: 1;}
        .btn-stop { background: #ff003c; color: white; font-weight: bold; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; flex: 1;}
        .history-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .chip { background: #333; padding: 8px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.2s; border: 1px solid #555; }
        .chip:hover { background: #00f2fe; color: black; border-color: #00f2fe; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">Gatijuegos App</div>
        <div class="sidebar-status" id="sidebar-status">🔴 Desconectado</div>
        
        <div class="menu-group">Acciones y Eventos</div>
        <div class="menu-item active" onclick="showTab('tab-conexion', this)"><i class="fa-solid fa-wifi"></i> Conexión a TikTok</div>
        <div class="menu-item" onclick="showTab('tab-regalos', this)"><i class="fa-solid fa-gift"></i> Gestor de Regalos</div>
        
        <div class="menu-group">Overlays Web</div>
        <div class="menu-item" onclick="showTab('tab-batalla', this)"><i class="fa-solid fa-khanda"></i> Batalla de Equipos</div>
        <div class="menu-item" onclick="showTab('tab-racha', this)"><i class="fa-solid fa-fire"></i> Rachas</div>
        <div class="menu-item" onclick="showTab('tab-racha-versus', this)"><i class="fa-solid fa-shield-halved"></i> Racha Versus</div>
        <div class="menu-item" onclick="showTab('tab-metalikes', this)"><i class="fa-solid fa-thumbs-up"></i> Meta de Likes</div>

        <div class="menu-group">Juegos Interactivos</div>
        <div class="menu-item" onclick="showTab('tab-bolita', this)"><i class="fa-solid fa-bowling-ball"></i> Bolita Globos</div>

        <div class="sidebar-version">Versión Oficial 1.4.0</div>
    </div>

    <div class="content">
        <div id="tab-conexion" class="tab-content active conexion-wrapper">
            <div class="status-bar" id="conexion-estado">🔴 Desconectado</div>
            <div class="box">
                <label>👤 Cuenta de TikTok a monitorear</label>
                <input type="text" id="input-usuario" placeholder="Ej. teamgatitos">
                <div style="display: flex; gap: 10px;">
                    <button class="btn-play" onclick="conectar()"><i class="fa-solid fa-play"></i> Conectar</button>
                    <button class="btn-stop" onclick="desconectar()"><i class="fa-solid fa-stop"></i> Parar</button>
                </div>
                
                <label style="margin-top: 30px; color: #ccc;"><i class="fa-solid fa-clock-rotate-left"></i> Historial de Testeo</label>
                <div class="history-chips" id="historial-lista"></div>
            </div>
        </div>

        <iframe id="tab-batalla" class="tab-content" src="/vista_versus"></iframe>
        <iframe id="tab-racha" class="tab-content" src="/vista_racha"></iframe>
        <iframe id="tab-racha-versus" class="tab-content" src="/vista_racha_versus"></iframe>
        <iframe id="tab-regalos" class="tab-content" src="/vista_regalos"></iframe>
        <iframe id="tab-bolita" class="tab-content" src="/vista_bolita_globos"></iframe>
        <iframe id="tab-metalikes" class="tab-content" src="/vista_meta_likes"></iframe>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const inputUsuario = document.getElementById('input-usuario');
        const estadoBar = document.getElementById('conexion-estado');
        const sidebarStatus = document.getElementById('sidebar-status');

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        socket.on('estado_conexion', (data) => {
            estadoBar.innerText = data.msg;
            if (data.estado === 'conectado') {
                estadoBar.style.color = '#00ff66';
                sidebarStatus.innerText = '🟢 Conectado';
                sidebarStatus.style.color = '#00ff66';
            }
            else if (data.estado === 'conectando' || data.estado === 'reconectando') {
                estadoBar.style.color = '#ffd700';
                sidebarStatus.innerText = '🟡 Conectando';
                sidebarStatus.style.color = '#ffd700';
            }
            else {
                estadoBar.style.color = '#ff003c'; 
                sidebarStatus.innerText = '🔴 Desconectado';
                sidebarStatus.style.color = '#ff003c';
            }
        });

        socket.on('config_actual', (config) => {
            if(document.activeElement !== inputUsuario) inputUsuario.value = config.username;
            let list = document.getElementById('historial-lista'); 
            list.innerHTML = '';
            if(config.historial && config.historial.length > 0) {
                config.historial.forEach(user => {
                    let chip = document.createElement('div'); 
                    chip.className = 'chip'; 
                    chip.innerText = '@' + user;
                    chip.onclick = () => { inputUsuario.value = user; conectar(); }; 
                    list.appendChild(chip);
                });
            }
        });

        function conectar() { if(inputUsuario.value.trim() !== "") socket.emit('comando_conectar', inputUsuario.value); }
        function desconectar() { socket.emit('comando_desconectar'); }
    </script>
</body>
</html>
