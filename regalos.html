<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Base de Datos de Regalos - Gatos Team</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f0f13; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #ff0050; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        p.subtitle { color: #888; margin-bottom: 30px; }
        
        .main-container { background: #1a1a24; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 800px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .form-row { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 30px; background: #222; padding: 15px; border-radius: 8px; border: 1px solid #444;}
        .form-col { flex: 1; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; color: #00f2fe;}
        input[type="text"], input[type="number"] { width: 100%; background: #000; color: #fff; border: 1px solid #555; border-radius: 6px; padding: 10px; font-size: 14px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #00f2fe; }
        
        .btn-add { background: #00f2fe; color: black; font-weight: bold; border: none; padding: 11px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s;}
        .btn-add:hover { background: #4facfe; }

        .table-container { max-height: 500px; overflow-y: auto; border: 1px solid #333; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; text-align: left; background: #111; }
        th { background: #222; padding: 12px; position: sticky; top: 0; border-bottom: 2px solid #444; color: #ccc; }
        td { padding: 12px; border-bottom: 1px solid #222; }
        tr:hover { background: #1a1a24; }
        
        .price { color: #ffd700; font-weight: bold; }
        .btn-del { background: none; color: #ff003c; border: none; cursor: pointer; font-size: 16px; padding: 5px; }
        .btn-del:hover { color: #ff3370; transform: scale(1.1); }
        
        #mensaje { text-align: center; margin-top: 15px; font-weight: bold; color: #00ff66; display: none; }
    </style>
</head>
<body>

    <h1><i class="fa-solid fa-database"></i> Catálogo Maestro de Regalos</h1>
    <p class="subtitle">Añade IDs manualmente o deja que el Radar automático los registre durante tus directos.</p>

    <div class="main-container">
        <!-- Formulario Manual -->
        <div class="form-row">
            <div class="form-col">
                <label>ID del Regalo</label>
                <input type="number" id="manual-id" placeholder="Ej. 5655">
            </div>
            <div class="form-col">
                <label>Nombre</label>
                <input type="text" id="manual-name" placeholder="Ej. Rosa">
            </div>
            <div class="form-col">
                <label>Precio (Monedas)</label>
                <input type="number" id="manual-price" placeholder="Ej. 1">
            </div>
            <button class="btn-add" onclick="agregarManual()"><i class="fa-solid fa-plus"></i> Añadir</button>
        </div>

        <div id="mensaje">✅ Regalo guardado correctamente.</div>

        <!-- Tabla de Datos -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID Oficial</th>
                        <th>Nombre del Regalo</th>
                        <th>Valor</th>
                        <th style="text-align: center;">Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-regalos">
                    <!-- Filas inyectadas por JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let catalogo = [];

        socket.on('config_actual', (config) => {
            catalogo = config.regalosDisponibles || [];
            renderTabla();
        });

        function renderTabla() {
            const tbody = document.getElementById('tabla-regalos');
            tbody.innerHTML = '';
            
            if (catalogo.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#666;">El catálogo está vacío.</td></tr>';
                return;
            }

            catalogo.forEach(g => {
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-family: monospace; color: #aaa;">${g.id}</td>
                    <td style="font-weight: bold;">${g.name}</td>
                    <td class="price"><i class="fa-solid fa-coins"></i> ${g.diamonds}</td>
                    <td style="text-align: center;">
                        <button class="btn-del" onclick="eliminar(${g.id})" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function agregarManual() {
            let id = parseInt(document.getElementById('manual-id').value);
            let name = document.getElementById('manual-name').value.trim();
            let price = parseInt(document.getElementById('manual-price').value);

            if (!id || !name || isNaN(price)) {
                alert("Por favor, rellena todos los campos correctamente.");
                return;
            }

            let nuevoRegalo = { id: id, name: name, diamonds: price };
            socket.emit('agregar_regalo_manual', nuevoRegalo);
            
            document.getElementById('manual-id').value = '';
            document.getElementById('manual-name').value = '';
            document.getElementById('manual-price').value = '';
            
            let msg = document.getElementById('mensaje');
            msg.style.display = 'block'; setTimeout(() => msg.style.display = 'none', 3000);
        }

        function eliminar(id) {
            if(confirm("¿Seguro que deseas eliminar este regalo del catálogo maestro? También se borrará de los equipos de batalla si estaba asignado.")) {
                socket.emit('eliminar_regalo_catalogo', id);
            }
        }
    </script>
</body>
</html>
