<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f0f13; color: white; font-family: 'Segoe UI', sans-serif; padding: 40px; margin: 0; }
        .box { background: #1a1a24; border: 1px solid #333; border-radius: 12px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); max-width: 1000px;}
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #222; padding: 15px; border-radius: 8px;}
        
        .racha-layout { display: flex; gap: 20px; align-items: flex-start;}
        .racha-col { flex: 1; background: #222; border: 1px solid #444; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; max-height: 450px;}
        .racha-col h3 { text-align: center; margin-top: 0; font-size: 16px; color: #fff; border-bottom: 1px solid #444; padding-bottom: 10px; text-transform: uppercase;}
        
        .user-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px;}
        .user-item { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; gap: 10px;}
        .user-info { display: flex; align-items: center; gap: 10px; overflow: hidden;}
        .user-info img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover;}
        .user-info div { display: flex; flex-direction: column; }
        .u-name { font-weight: bold; font-size: 13px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;}
        .u-data { font-size: 12px; color: #ffd700; font-weight: bold;}
        
        .btn-ctrl { background: #333; border: none; color: white; width: 28px; height: 28px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center;}
        .btn-ctrl:hover { background: #555;}
        .btn-del { color: #ff003c; }
        .btn-del:hover { background: #ff003c; color: white; }

        .btn-clear { background: #444; color: white; border: none; padding: 10px; width: 100%; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px;}
        .btn-clear:hover { background: #ff003c; }

        .btn-overlay { padding: 10px 15px; background: #222; color: #00f2fe; font-size: 13px; font-weight: bold; border: 1px solid #00f2fe; cursor: pointer; border-radius: 8px;}
        .btn-overlay:hover { background: #00f2fe; color: black;}
    </style>
</head>
<body>
    <div class="box">
        <div class="top-row">
            <div style="display:flex; gap: 20px; align-items:center;">
                <label style="cursor: pointer; font-weight: bold;"><input type="checkbox" id="opt-name" onchange="guardarOpts()"> Mostrar Nombre</label>
                <label style="cursor: pointer; font-weight: bold;"><input type="checkbox" id="opt-count" onchange="guardarOpts()"> Mostrar Victorias</label>
                <label style="cursor: pointer; font-weight: bold;"><input type="checkbox" id="opt-coins" onchange="guardarOpts()"> Mostrar Monedas</label>
            </div>
            <div style="display:flex; gap: 10px;">
                <button class="btn-overlay" onclick="window.open('/racha_versus.html', '_blank')"><i class="fa-solid fa-eye"></i> Abrir Overlay Racha Versus</button>
                <button class="btn-overlay" onclick="copiarURL()"><i class="fa-solid fa-link"></i> Copiar URL OBS</button>
            </div>
        </div>

        <div class="racha-layout">
            <div class="racha-col" style="border-color: #00ff66;">
                <h3 style="color:#00ff66;"><i class="fa-solid fa-shield-halved"></i> Récord de Salvadores (Eq 1)</h3>
                <div class="user-list" id="lista-salvadas"></div>
                <div><button class="btn-clear" onclick="limpiarRacha('salvadas')"><i class="fa-solid fa-trash"></i> Limpiar Todo</button></div>
            </div>

            <div class="racha-col" style="border-color: #ff003c;">
                <h3 style="color:#ff003c;"><i class="fa-solid fa-skull"></i> Récord de Reinicios (Eq 2)</h3>
                <div class="user-list" id="lista-reinicios"></div>
                <div><button class="btn-clear" onclick="limpiarRacha('reinicios')"><i class="fa-solid fa-trash"></i> Limpiar Todo</button></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        socket.on('racha_versus_update', (data) => {
            if(!data) return;
            
            document.getElementById('opt-name').checked = data.showName !== false;
            document.getElementById('opt-count').checked = data.showCount !== false;
            document.getElementById('opt-coins').checked = data.showCoins !== false;

            let lSalv = document.getElementById('lista-salvadas'); lSalv.innerHTML = '';
            Object.values(data.salvadas || {}).sort((a,b)=>b.count-a.count).forEach(u => {
                lSalv.innerHTML += `
                <div class="user-item">
                    <div class="user-info"><img src="${u.avatar}"><div><span class="u-name">${u.displayName}</span><span class="u-data" style="color:#00ff66;">${u.count} SALVADAS | <i class="fa-solid fa-coins"></i> ${u.monedas || 0}</span></div></div>
                    <div style="display:flex;gap:5px;">
                        <button class="btn-ctrl" onclick="ajustarWin('salvadas','${u.displayName}',-1)">-</button>
                        <button class="btn-ctrl" onclick="ajustarWin('salvadas','${u.displayName}',1)">+</button>
                        <button class="btn-ctrl btn-del" onclick="eliminarUser('salvadas','${u.displayName}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            });

            let lRein = document.getElementById('lista-reinicios'); lRein.innerHTML = '';
            Object.values(data.reinicios || {}).sort((a,b)=>b.count-a.count).forEach(u => {
                lRein.innerHTML += `
                <div class="user-item">
                    <div class="user-info"><img src="${u.avatar}"><div><span class="u-name">${u.displayName}</span><span class="u-data" style="color:#ff003c;">${u.count} REINICIOS | <i class="fa-solid fa-coins"></i> ${u.monedas || 0}</span></div></div>
                    <div style="display:flex;gap:5px;">
                        <button class="btn-ctrl" onclick="ajustarWin('reinicios','${u.displayName}',-1)">-</button>
                        <button class="btn-ctrl" onclick="ajustarWin('reinicios','${u.displayName}',1)">+</button>
                        <button class="btn-ctrl btn-del" onclick="eliminarUser('reinicios','${u.displayName}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            });
        });

        function ajustarWin(tipo, nombre, cant) { socket.emit('racha_versus_ajuste', { tipo: tipo, name: nombre, amount: cant }); }
        
        function eliminarUser(tipo, nombre) {
            if(confirm(`¿Eliminar a ${nombre} del récord de ${tipo}?`)) socket.emit('racha_versus_eliminar', { tipo: tipo, name: nombre });
        }
        function limpiarRacha(tipo) { 
            if(confirm(`🚨 ¿Borrar TODO el historial de ${tipo}?`)) socket.emit('racha_versus_limpiar', tipo); 
        }
        
        function guardarOpts() { socket.emit('racha_versus_guardar_opciones', { showName: document.getElementById('opt-name').checked, showCount: document.getElementById('opt-count').checked, showCoins: document.getElementById('opt-coins').checked }); }
        function copiarURL() { navigator.clipboard.writeText(window.location.origin + '/racha_versus.html'); alert("✅ Enlace copiado!"); }
    </script>
</body>
</html>
