<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,900&display=swap');
        body { margin: 0; padding: 30px; background-color: transparent; font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; display: flex; justify-content: center; }
        
        .widget { display: flex; flex-direction: column; align-items: center; background: rgba(15, 15, 20, 0.85); border: 2px solid #ffaa00; border-radius: 16px; padding: 20px 30px; box-shadow: 0 0 25px rgba(255, 170, 0, 0.4); text-align: center; min-width: 280px; }
        
        .streak-title { font-size: 28px; font-weight: 900; color: #ffaa00; text-transform: uppercase; text-shadow: 2px 2px 0px black; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;}
        .streak-title span { font-size: 45px; color: #fff; text-shadow: 0 0 15px #ffaa00, 2px 2px 0px black; display: inline-block;}
        
        .mvp-section { display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.6); border-radius: 12px; padding: 20px; width: 100%; box-sizing: border-box; border: 1px solid #444; }
        .mvp-label { font-size: 13px; color: #00f2fe; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; text-shadow: 1px 1px 0px black;}
        
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #00f2fe; object-fit: cover; margin-bottom: 12px; box-shadow: 0 0 15px rgba(0, 242, 254, 0.5); }
        .name { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 5px; text-transform: uppercase; }
        .coins { font-size: 18px; color: #ffd700; font-weight: bold; margin-bottom: 15px; }
        
        .lifetime { font-size: 15px; color: #00ff66; font-weight: bold; padding: 8px 15px; background: rgba(0, 255, 102, 0.1); border-radius: 20px; border: 1px solid rgba(0, 255, 102, 0.3); white-space: nowrap;}
        
        @keyframes pop { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.5); color: #fff; text-shadow: 0 0 30px #fff; } 
            100% { transform: scale(1); } 
        }
    </style>
</head>
<body>
    <div class="widget">
        <div class="streak-title">🔥 WINS: <span id="win-number">0</span> 🔥</div>
        <div class="mvp-section" id="mvp-section" style="display:none;">
            <div class="mvp-label">👑 TOP 1 DONADOR 👑</div>
            <img src="" id="avatar" class="avatar" onerror="this.src='https://via.placeholder.com/80/222/fff?text=?'">
            <div class="name" id="name">ESPERANDO</div>
            <div class="coins" id="coins"><i class="fa-solid fa-coins"></i> 0</div>
            <div class="lifetime" id="lifetime">🏆 Récord Histórico: 0 Wins</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentConfig = null;
        let currentTop1 = null;

        socket.on('config_actual', (config) => {
            currentConfig = config;
            updateUI();
        });

        socket.on('actualizacion', (top) => {
            currentTop1 = top[0] || null;
            updateUI();
        });

        socket.on('racha_animacion', () => {
            let el = document.getElementById('win-number');
            el.style.animation = 'none';
            void el.offsetWidth; 
            el.style.animation = 'pop 0.5s ease-out';
        });

        function updateUI() {
            if (!currentConfig) return;
            
            document.getElementById('win-number').innerText = currentConfig.racha?.currentWins || 0;
            
            let mvpSection = document.getElementById('mvp-section');
            if (currentTop1 && currentTop1.nombre !== 'ESPERANDO') {
                mvpSection.style.display = 'flex';
                document.getElementById('avatar').src = currentTop1.avatar;
                document.getElementById('name').innerText = currentTop1.nombre;
                
                let coinsEl = document.getElementById('coins');
                if (currentConfig.racha?.showCoins) {
                    coinsEl.style.display = 'block';
                    coinsEl.innerHTML = `<i class="fa-solid fa-coins"></i> ${currentTop1.monedas}`;
                } else {
                    coinsEl.style.display = 'none';
                }
                
                let lifetimeWins = 0;
                if (currentConfig.lifetimeWins && currentConfig.lifetimeWins[currentTop1.nombre]) {
                    lifetimeWins = currentConfig.lifetimeWins[currentTop1.nombre];
                }
                document.getElementById('lifetime').innerHTML = `🏆 Récord Histórico: ${lifetimeWins} Wins`;
            } else {
                mvpSection.style.display = 'none';
            }
        }
    </script>
</body>
</html>
